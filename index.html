function liveRenderControls() {
  var el = document.getElementById('live-ctrl-row');
  if (!el) return;
  var btns = '';
  if (!_LIVE.running && _LIVE.half === 1 && _LIVE.elapsed === 0) {
    btns = '<button class="live-btn green" onclick="liveStart()">▶ Démarrer</button>';
  } else if (_LIVE.running && _LIVE.half === 1) {
    btns = '<button class="live-btn" onclick="livePause()">⏸ Pause</button>' +
           '<button class="live-btn orange" onclick="liveHalfTime()">🔔 Mi-temps</button>';
  } else if (!_LIVE.running && _LIVE.half === 1 && _LIVE.elapsed > 0) {
    btns = '<button class="live-btn green" onclick="liveStart()">▶ Reprendre</button>' +
           '<button class="live-btn orange" onclick="liveHalfTime()">🔔 Mi-temps</button>';
  } else if (!_LIVE.running && _LIVE.half === 2 && _LIVE.elapsed === 0) {
    btns = '<button class="live-btn green" onclick="liveStart()">▶ 2ème mi-temps (45\'→90\')</button>';
  } else if (_LIVE.running && _LIVE.half === 2) {
    btns = '<button class="live-btn" onclick="livePause()">⏸ Pause</button>' +
           '<button class="live-btn red" onclick="liveEnd()">🏁 Fin du match</button>';
  } else if (!_LIVE.running && _LIVE.half === 2 && _LIVE.elapsed > 0) {
    btns = '<button class="live-btn green" onclick="liveStart()">▶ Reprendre</button>' +
           '<button class="live-btn red" onclick="liveEnd()">🏁 Fin du match</button>';
  }
  btns += '<button class="live-btn" onclick="liveStop()" style="background:#333;font-size:12px;padding:7px 14px;margin-top:4px">⛔ Stop</button>';
  el.innerHTML = btns;
}

function liveRenderLog() {
  var el = document.getElementById('live-log');
  if (!el) return;
  if (!_LIVE.events.length) {
    el.innerHTML = '<div style="color:#aaa;font-size:13px;text-align:center;padding:16px">Aucune action pour le moment</div>';
    return;
  }
  var sorted = _LIVE.events.slice().sort(function(a,b){return b.min-a.min;});
  el.innerHTML = sorted.map(function(ev) {
    var icon = ''; // icon already included in ev.label
    var minInput = '<input type="number" value="'+ev.min+'" min="0" max="120" ' +
      'style="width:44px;border:1.5px solid var(--border);border-radius:4px;padding:2px 4px;font-size:13px;font-weight:700;text-align:center;font-family:Barlow Condensed,sans-serif;color:var(--red)" ' +
      'onchange="liveEditEventMin(this,'+_LIVE.events.indexOf(ev)+')" ' +
      'onclick="this.select()">';
    return '<div style="display:flex;align-items:center;gap:10px;padding:9px 12px;border-bottom:1px solid #f0ede8;font-size:14px">' +
      '<span style="font-size:11px;font-weight:800;font-family:Barlow Condensed,sans-serif;color:var(--red)">' + minInput + '</span>' +
      
      '<span style="flex:1;font-weight:600">' + ev.label + '</span>' +
      '<button onclick="liveDeleteEvent('+_LIVE.events.indexOf(ev)+')" style="background:none;border:none;color:#ccc;cursor:pointer;font-size:16px;padding:2px 6px" title="Supprimer">✕</button>' +
    '</div>';
  }).join('');
}

function liveEditEventMin(input, idx) {
  if (_LIVE.events[idx]) {
    _LIVE.events[idx].min = +input.value;
    liveApplyEventToPMD(_LIVE.events[idx]);
  }
}

function liveDeleteEvent(idx) {
  _LIVE.events.splice(idx, 1);
  liveRenderLog();
}

function liveApplyEventToPMD(ev) {
  if (!ev.pid) return;
  var key = ev.pid + '_' + _LIVE.matchId;
  if (!APP.pmd[key]) APP.pmd[key] = {};
  var d = APP.pmd[key];
  if (ev.type === 'but') {
    d.buts = (d.buts||0);
    d.but_min = ev.min;
  } else if (ev.type === 'jaune') {
    d.c_j = true; d.c_j_min = ev.min; d.carton = 'jaune';
  } else if (ev.type === 'dj') {
    d.c_j2 = true; d.c_j2_min = ev.min; d.carton = 'dj';
  } else if (ev.type === 'rouge') {
    d.c_r = true; d.c_r_min = ev.min; d.carton = 'rouge';
  }
  try { renderRecap(); } catch(e) {}
}

  el.style.borderColor = 'var(--red)'; el.style.background = '#fff8f8';
  window._liveSubOut = pid;
  liveUpdateSubPreview();
}

function livePickIn(pid, el) {
  document.querySelectorAll('#sub-in-list > div').forEach(function(d) { d.style.borderColor='var(--border)';d.style.background=''; });
  el.style.borderColor = '#22c55e'; el.style.background = '#f0fdf4';
  window._liveSubIn = pid;
  liveUpdateSubPreview();
}

function liveUpdateSubPreview() {
  var prev = document.getElementById('sub-preview');
  var btn = document.getElementById('sub-confirm-btn');
  if (!prev || !btn) return;
  if (window._liveSubOut && window._liveSubIn) {
    var pOut = APP.players.find(function(p){return p.id===window._liveSubOut;});
    var pIn = APP.players.find(function(p){return p.id===window._liveSubIn;});
    prev.style.display = 'block';
    prev.innerHTML = '↑ ' + (pOut?pOut.name:'?') + ' <span style="color:var(--red)">→</span> ↓ ' + (pIn?pIn.name:'?');
    btn.style.display = 'block';
  } else {
    prev.style.display = 'none';
    btn.style.display = 'none';
  }
}

function liveConfirmSub() {
  var min = +(document.getElementById('live-pick-min')||{value:liveGetMin()}).value;
  var pOut = APP.players.find(function(p){return p.id===window._liveSubOut;});
  var pIn = APP.players.find(function(p){return p.id===window._liveSubIn;});
  if (!pOut || !pIn) return;
  // Update pmd: outgoing player gets his minutes capped, incoming player enters
  var keyOut = pOut.id + '_' + _LIVE.matchId;
  var keyIn = pIn.id + '_' + _LIVE.matchId;
  if (!APP.pmd[keyOut]) APP.pmd[keyOut] = {};
  if (!APP.pmd[keyIn]) APP.pmd[keyIn] = {};
  // Outgoing player: cap their minutes
  APP.pmd[keyOut].min = min;
  APP.pmd[keyOut]._benchStart = false;
  // Incoming player: set their actual minutes played
  APP.pmd[keyIn].statut = 'R';
  APP.pmd[keyIn].min = 90 - min;
  APP.pmd[keyIn]._benchStart = false; // they are now on the pitch
  var ev = { min: min, type: 'changement', pid: pOut.id, pid2: pIn.id,
    label: '↑ ' + pOut.name + ' → ↓ ' + pIn.name };
  _LIVE.events.push(ev);
  document.getElementById('live-picker').style.display = 'none';
  liveRenderLog();
  try { renderRecap(); } catch(e) {}
}

function livePick(type, pid, el) {
  var min = +(document.getElementById('live-pick-min')||{value:liveGetMin()}).value;
  var p = APP.players.find(function(x){return x.id===pid;});
  if (!p) return;
  var icons = {but:'⚽',jaune:'🟨',rouge:'🟥 R',dj:'🟥 2J=R'};
  var ev = { min: min, type: type, pid: pid, label: (icons[type]||'') + ' ' + p.name };
  _LIVE.events.push(ev);
  liveApplyEventToPMD(ev);
  // For buts, increment count + update score
  if (type === 'but') {
    var key = pid+'_'+_LIVE.matchId;
    if (!APP.pmd[key]) APP.pmd[key]={};
    APP.pmd[key].buts = (APP.pmd[key].buts||0) + 1;
    _LIVE.scoreSDR++;
    liveUpdateScore();
    liveGoalAnimation(true);
  }
  document.getElementById('live-picker').style.display = 'none';
  liveRenderLog();
}

function liveClosePicker() {
  document.getElementById('live-picker').style.display = 'none';
}

    _LIVE.matchId = id;
    _LIVE.comp = comp;

    _LIVE.firstHalfElapsed = 0;

      '<div style="font-size:12px;color:rgba(255,255,255,0.4);font-family:Barlow Condensed,sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:2px;margin-top:4px">'+m.name+'</div>'+

function liveShowIndicator() {
  var el = document.getElementById('live-indicator');
  if (!el) {
    el = document.createElement('div');
    el.id = 'live-indicator';
    el.style.cssText = 'position:fixed;bottom:80px;right:16px;background:var(--red);color:#fff;'+
      'border-radius:50px;padding:10px 18px;font-family:Barlow Condensed,sans-serif;font-weight:800;'+
      'font-size:14px;text-transform:uppercase;letter-spacing:1px;cursor:pointer;z-index:8000;'+
      'box-shadow:0 4px 16px rgba(200,32,16,.5);display:flex;align-items:center;gap:8px;'+
      'animation:livePulse 1.5s infinite';
    el.onclick = function() {
      var m = APP.matches[_LIVE.comp].find(function(x){return x.id===_LIVE.matchId;});
      if (m) showLiveModal(_LIVE.matchId, _LIVE.comp, true);
    };
    document.body.appendChild(el);
  }
  el.style.display = 'flex';

function liveUpdateIndicator() {
  var el = document.getElementById('live-indicator');
  if (!el || el.style.display === 'none') return;
  var t = liveGetDisplay();
  el.innerHTML = '<span style="width:8px;height:8px;background:#fff;border-radius:50%;display:inline-block;animation:livePulse 1s infinite"></span>' +
    '🔴 LIVE ' + t.minLabel + '  ' + liveScoreDisplay();
}

function liveHideIndicator() {
  var el = document.getElementById('live-indicator');
  if (el) el.style.display = 'none';
}

function liveScoreDisplay() {
  var m = APP.matches[_LIVE.comp].find(function(x){return x.id===_LIVE.matchId;});
  var matchName = m ? m.name : '';
  var isHome = matchName.toUpperCase().indexOf('SDR') === 0;
  if (isHome) return _LIVE.scoreSDR + '-' + _LIVE.scoreADV;
  return _LIVE.scoreADV + '-' + _LIVE.scoreSDR;
}

    '<span style="font-size:13px;font-weight:600;color:#555">Minute :</span>' +
    '<input id="live-pick-min" type="number" value="'+min+'" min="0" max="120" ' +
    'style="width:64px;border:2px solid var(--red);border-radius:5px;padding:5px 8px;font-size:16px;font-weight:700;text-align:center;font-family:Barlow Condensed,sans-serif;color:var(--red)">' +

  document.getElementById('live-picker').style.display = 'flex';

  // Show player picker for who scored
  var players = APP.players.filter(function(p) {
    var d = APP.pmd[p.id+'_'+_LIVE.matchId]||{};

  });

      'onmouseout="this.style.borderColor=\'var(--border)\';this.style.background=\'\'">' +

function liveButADV(teamName) {
  var min = +(document.getElementById('live-pick-min')||{value:liveGetMin()}).value;
  // Goal for opponent — no player selection needed
  _LIVE.scoreADV++;
  liveUpdateScore();
  var ev = { min: min, type: 'but_adv', label: '⚽ ' + teamName + ' (but adverse)' };
  _LIVE.events.push(ev);
  document.getElementById('live-picker').style.display = 'none';
  liveRenderLog();
  liveGoalAnimation(false);
  // Update match score in APP
  liveAutoUpdateScore();
}

function liveUpdateScore() {
  // Update score display in the live modal
  var m = APP.matches[_LIVE.comp].find(function(x){return x.id===_LIVE.matchId;});
  if (!m) return;
  // Update visual score boxes
  var sdrEl = document.getElementById('live-score-sdr');
  var advEl = document.getElementById('live-score-adv');
  if (sdrEl) { sdrEl.textContent = _LIVE.scoreSDR; sdrEl.style.animation='none'; void sdrEl.offsetWidth; sdrEl.style.animation='goalBounce .4s ease-out'; }
  if (advEl) { advEl.textContent = _LIVE.scoreADV; }
  // Update hidden input for save
  var isHome = m.name.toUpperCase().indexOf('SDR') === 0;
  var score = isHome ? _LIVE.scoreSDR+'-'+_LIVE.scoreADV : _LIVE.scoreADV+'-'+_LIVE.scoreSDR;
  var el = document.getElementById('live-score');
  if (el) el.value = score;
  liveAutoUpdateScore();
}

function liveAutoUpdateScore() {
  // Save score to match data in real time
  var m = APP.matches[_LIVE.comp].find(function(x){return x.id===_LIVE.matchId;});
  if (!m) return;
  var isHome = m.name.toUpperCase().indexOf('SDR') === 0;
  m.score = isHome
    ? _LIVE.scoreSDR + '-' + _LIVE.scoreADV
    : _LIVE.scoreADV + '-' + _LIVE.scoreSDR;
  m.res = getRes(m.score, m.name);
  renderCompStats();
  renderMatchList();
  try { renderRecap(); } catch(e) {}
}

function liveGoalAnimation(isSDR) {
  var overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:99999;pointer-events:none;';
  overlay.innerHTML = '<div style="font-size:120px;animation:goalBounce .6s ease-out;text-align:center;">' +
    (isSDR ? '⚽<br><span style="font-size:32px;font-family:Barlow Condensed,sans-serif;font-weight:900;color:var(--red);text-shadow:2px 2px 8px rgba(0,0,0,.3)">BUT !</span>' : '⚽') +
    '</div>';
  document.body.appendChild(overlay);
  setTimeout(function() { document.body.removeChild(overlay); }, 1500);
}

function showSanctionMenu(e, key, refreshFn) {
  e.stopPropagation();
  var ex = document.getElementById('sanction-dropdown');
  if (ex) ex.parentNode.removeChild(ex);
  if (!APP.pmd[key]) APP.pmd[key] = {};
  var d = APP.pmd[key];

  var menu = document.createElement('div');
  menu.id = 'sanction-dropdown';
  menu.style.cssText = 'position:fixed;z-index:99999;background:#fff;border-radius:10px;'+
    'box-shadow:0 8px 32px rgba(0,0,0,0.18);min-width:200px;overflow:hidden;'+
    'border:1.5px solid #e2ddd8;animation:fadeInDown .12s ease-out';
  var rect = e.target.getBoundingClientRect();
  menu.style.top  = Math.min(rect.bottom + 4, window.innerHeight - 300) + 'px';
  menu.style.left = Math.min(rect.left, window.innerWidth - 220) + 'px';

  function doRefresh() {
    try { window[refreshFn](); } catch(x) {}
    try { renderCartons(); } catch(x) {}
    try { renderStaffCartons(); } catch(x) {}
    try { renderRecap(); } catch(x) {}
  }
  function closeMenu() { if (menu.parentNode) menu.parentNode.removeChild(menu); }

  // ── Option rows ──────────────────────────────────────────────
  var options = [
    { label:'🟨 Jaune',  value:'jaune', active: d.carton==='jaune' },
    { label:'🟥 2J = Rouge', value:'dj', active: d.carton==='dj' },
    { label:'🟥 Rouge direct', value:'rouge', active: d.carton==='rouge' },
    { label:'<span style="display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;background:#111;border-radius:3px;color:#fff;font-weight:900;font-size:12px;vertical-align:middle">S</span> <span style="color:#c084fc;font-weight:800">Suspension</span>', value:'susp', active: !!d.suspension, purple: true },
    { label:'✕ Effacer', value:'clear', active: false, muted: true }
  ];

  options.forEach(function(opt) {
    var row = document.createElement('div');
    row.style.cssText = 'padding:11px 16px;cursor:pointer;font-family:Barlow Condensed,sans-serif;'+
      'font-weight:700;font-size:14px;display:flex;align-items:center;gap:10px;'+
      'border-bottom:1px solid #f0ede8;background:'+(opt.active?'#fff8f8':'#fff')+';'+
      'color:'+(opt.muted?'#aaa':opt.purple?'#c084fc':'#222');
    row.innerHTML = '<span style="min-width:20px">'+(opt.active?'✅':'')+'</span>'+opt.label;
    row.onmouseover = function(){this.style.background='#f5f3ef';};
    row.onmouseout  = function(){this.style.background=opt.active?'#fff8f8':'#fff';};
    row.onclick = function(ev) {
      ev.stopPropagation();
      if (!APP.pmd[key]) APP.pmd[key]={};
      var d2 = APP.pmd[key];
      if (opt.value==='clear') {
        d2.carton=''; d2.suspension=false; d2.c_j=false; d2.c_j2=false; d2.c_r=false; d2.carton_num=1;
      } else if (opt.value==='susp') {
        d2.suspension = !d2.suspension;
      } else {
        d2.carton = (d2.carton===opt.value) ? '' : opt.value;
        d2.c_j  = d2.carton==='jaune';
        d2.c_j2 = d2.carton==='dj';
        d2.c_r  = d2.carton==='rouge';
        if (!d2.carton_num) d2.carton_num = 1;
      }
      closeMenu();
      doRefresh();
    };
    menu.appendChild(row);
  });

  // ── Number picker (1–5) ──────────────────────────────────────
  var numRow = document.createElement('div');
  numRow.style.cssText = 'padding:8px 14px;display:flex;align-items:center;gap:6px;border-top:2px solid #f0ede8;background:#fafafa';
  var lbl = document.createElement('span');
  lbl.style.cssText = 'font-size:12px;color:#777;font-weight:700;font-family:Barlow Condensed,sans-serif;margin-right:2px';
  lbl.textContent = 'N° carton :';
  numRow.appendChild(lbl);

  [1,2,3,4,5].forEach(function(n) {
    var btn = document.createElement('button');
    btn.textContent = n;
    var active = (d.carton_num||1) === n;
    btn.style.cssText = 'width:26px;height:26px;border-radius:50%;cursor:pointer;'+
      'font-weight:800;font-size:12px;font-family:Barlow Condensed,sans-serif;'+
      'border:2px solid '+(active?'var(--red)':'#ddd')+';'+
      'background:'+(active?'var(--red)':'#fff')+';'+
      'color:'+(active?'#fff':'#555');
    btn.onclick = function(ev) {
      ev.stopPropagation();
      if (!APP.pmd[key]) APP.pmd[key] = {};
      APP.pmd[key].carton_num = n;
      closeMenu();
      doRefresh();
    };
    numRow.appendChild(btn);
  });
  menu.appendChild(numRow);

  document.body.appendChild(menu);
  setTimeout(function() {
    document.addEventListener('click', function _c(ev) {
      if (!menu.contains(ev.target)) { closeMenu(); document.removeEventListener('click', _c); }
    });
  }, 10);
}


function renderStaffPassportAlerts() {
  var container = document.getElementById('staff-passport-alerts');
  if (!container) return;

  var today = new Date();
  var sixMonths = new Date(today); sixMonths.setMonth(sixMonths.getMonth()+6);
  var threeMonths = new Date(today); threeMonths.setMonth(threeMonths.getMonth()+3);

  var alerts = [];
  APP.staff.forEach(function(s) {
    if (!s.passport) return;
    var exp = new Date(s.passport);
    if (isNaN(exp.getTime())) return;
    var diffDays = Math.floor((exp - today) / (1000*60*60*24));
    if (exp <= sixMonths) alerts.push({s:s, exp:exp, diff:diffDays});
  });
  alerts.sort(function(a,b){return a.diff-b.diff;});

  // Update badge
  var badge = document.getElementById('staff-passport-badge');
  if (badge) badge.textContent = alerts.length > 0 ? alerts.length : '';

  if (alerts.length === 0) {
    container.innerHTML =
      '<div style="text-align:center;padding:60px 20px;color:var(--muted)">'+
        '<div style="font-size:56px;margin-bottom:16px">✅</div>'+
        '<div style="font-family:Barlow Condensed,sans-serif;font-weight:800;font-size:24px;color:#333;text-transform:uppercase;letter-spacing:1px">Aucune alerte document staff</div>'+
        '<div style="font-size:15px;margin-top:8px;color:#888">Tous les documents sont valides plus de 6 mois.</div>'+
      '</div>';
    return;
  }

  container.innerHTML = alerts.map(function(item) {
    var s = item.s;
    var diff = item.diff;
    var isCrit = item.exp <= threeMonths;
    var isExpired = diff < 0;
    var expStr = item.exp.toLocaleDateString('fr-FR');
    var diffStr = isExpired
      ? 'EXPIRÉ depuis ' + Math.abs(diff) + ' j'
      : diff + ' jour' + (diff>1?'s':'') + ' restant' + (diff>1?'s':'');

    return '<div style="background:#fff;border-left:5px solid '+(isCrit?'var(--red)':'var(--gold)')+';border-radius:8px;padding:16px 20px;margin-bottom:12px;display:flex;align-items:center;gap:16px;box-shadow:0 2px 8px rgba(0,0,0,0.08)">'+
      (s.passportPhoto?'<img src="'+s.passportPhoto+'" style="width:36px;height:48px;object-fit:cover;border-radius:4px;border:1.5px solid #e2ddd8;flex-shrink:0">':'<div style="font-size:28px;flex-shrink:0">'+(isExpired?'🚫':isCrit?'🚨':'⚠️')+'</div>')+
      '<div style="flex:1">'+
        '<div style="font-family:Barlow Condensed,sans-serif;font-weight:800;font-size:18px;text-transform:uppercase;color:#111">'+s.name+'</div>'+
        '<div style="font-size:13px;color:#888;margin-top:3px">'+s.role+' · Expiration: '+expStr+'</div>'+
      '</div>'+
      '<div style="text-align:right;flex-shrink:0">'+
        '<div style="font-family:Barlow Condensed,sans-serif;font-weight:800;font-size:16px;color:'+(isCrit?'var(--red)':'var(--gold)')+'">'+diffStr+'</div>'+
        '<button onclick="showAddStaffModal(\''+s.id+'\')" style="margin-top:6px;background:var(--red);color:#fff;border:none;border-radius:4px;padding:5px 12px;font-family:Barlow Condensed,sans-serif;font-weight:700;font-size:12px;text-transform:uppercase;cursor:pointer;letter-spacing:1px">Modifier</button>'+
      '</div>'+
    '</div>';
  }).join('');
}

function navMove(idx, dir) {
  var items = window._navItems;
  var newIdx = idx + dir;
  if (newIdx < 0 || newIdx >= items.length) return;
  var tmp = items[idx];
  items[idx] = items[newIdx];
  items[newIdx] = tmp;
  window._navItems = items;
  // Re-render the list inside the modal
  var list = document.getElementById('nav-sort-list');
  if (!list) return;
  list.innerHTML = items.map(function(item, i) {
    return '<div style="display:flex;align-items:center;gap:10px;padding:11px 14px;' +
      'background:#fff;border:1.5px solid #e2ddd8;border-radius:8px;margin-bottom:8px">' +
      '<span style="font-family:Barlow Condensed,sans-serif;font-weight:700;font-size:15px;flex:1">' +
        item.label +
      '</span>' +
      '<div style="display:flex;flex-direction:column;gap:3px">' +
        '<button onclick="navMove('+i+',-1)" ' +
          'style="background:#f5f3ef;border:1.5px solid #ddd;border-radius:5px;padding:4px 10px;' +
          'font-size:14px;cursor:pointer;line-height:1;'+(i===0?'opacity:.3':'')+'">↑</button>' +
        '<button onclick="navMove('+i+',1)" ' +
          'style="background:#f5f3ef;border:1.5px solid #ddd;border-radius:5px;padding:4px 10px;' +
          'font-size:14px;cursor:pointer;line-height:1;'+(i===items.length-1?'opacity:.3':'')+'">↓</button>' +
      '</div>' +
    '</div>';
  }).join('');
}

function navApplyOrder() {
  var items = window._navItems;
  if (!items) return;
  var nav = document.getElementById('main-nav');
  var configBtn = nav.querySelector('[title="Réorganiser les onglets"]');
  // Remove all data-page buttons
  Array.from(nav.querySelectorAll('[data-page]')).forEach(function(b) { nav.removeChild(b); });
  // Re-insert in new order before config button
  items.forEach(function(item) {
    var btn = document.createElement('button');
    btn.className = 'nb' + (item.page === 'passeport' ? ' gold-tab' : '');
    btn.setAttribute('data-page', item.page);
    btn.innerHTML = item.label;
    btn.addEventListener('click', function() { showPage(item.page, btn); });
    nav.insertBefore(btn, configBtn);
  });
  // Save order
  try { localStorage.setItem('nav_order', JSON.stringify(items.map(function(i) { return i.page; }))); } catch(e) {}
  closeModal();
}

function restoreNavOrder() {
  try {
    var saved = localStorage.getItem('nav_order');
    if (!saved) return;
    var order = JSON.parse(saved);
    var nav = document.getElementById('main-nav');
    var configBtn = nav.querySelector('[title="Réorganiser les onglets"]');
    var btns = {};
    Array.from(nav.querySelectorAll('[data-page]')).forEach(function(b) {
      btns[b.getAttribute('data-page')] = b;
      nav.removeChild(b);
    });
    order.forEach(function(page) {
      if (btns[page]) nav.insertBefore(btns[page], configBtn);
    });
    Object.keys(btns).forEach(function(page) {
      if (order.indexOf(page) < 0 && btns[page]) nav.insertBefore(btns[page], configBtn);
    });
  } catch(e) {}
}

  // Reset match score and result — keep date, journée, nom, adversaire
  var m = APP.matches[comp].find(function(x){return x.id===id;});
  if (m) { m.score = ''; m.res = ''; }

  // Remove all pmd data for this match
  APP.players.forEach(function(p) {

    'border-radius:30px;padding:12px 24px;font-family:Barlow Condensed,sans-serif;font-weight:800;font-size:15px;'+

    var val = 0;
    if (field==='buts') val = d.buts||0;
    else if (field==='min') val = d.min||0;
    else if (field==='matchs') val = (d.statut==='T'||d.statut==='R')?1:0;
    else if (field==='l2b') { if(comp==='L2') val=d.buts||0; else return; }
    else if (field==='cdfb') { if(comp==='CDF') val=d.buts||0; else return; }
    if (field==='matchs'||val>0||field==='min') {
      var compBadge = '<span style="font-size:10px;background:'+(comp==='CDF'?'#f59e0b':'#3b82f6')+';color:#fff;border-radius:3px;padding:1px 4px;font-weight:700">'+comp+'</span>';
      rows += '<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #f0ede8">'
        +'<div style="font-family:Barlow Condensed,sans-serif;font-weight:700;font-size:14px;min-width:30px">'+m.j+'</div>'
        +compBadge
        +'<div style="flex:1;font-size:13px;color:#555">'+m.name+'</div>'
        +(m.date?'<div style="font-size:11px;color:#aaa">'+m.date+'</div>':'')
        +'<div style="font-weight:800;font-size:15px;color:var(--red);min-width:30px;text-align:right">'+(field==='matchs'?d.statut:val+(field.indexOf('b')>=0?' ⚽':'\' '))+'</div>'
        +'</div>';
      total += val;
    }
  });
  var fieldLabel = {buts:'Buts totaux',min:'Minutes jouées',matchs:'Matchs joués',l2b:'Buts '+APP.champName,cdfb:'Buts CDF'}[field]||field;
  openModal(
    '<div class="mo-hdr"><div class="mo-title">'+(p.nomMaillot||p.name)+'</div>'
    +'<button class="mo-x" onclick="closeModal()">✕</button></div>'
    +'<div class="mo-body">'
    +'<div style="font-family:Barlow Condensed,sans-serif;font-weight:800;font-size:13px;text-transform:uppercase;letter-spacing:1px;color:#888;margin-bottom:10px">'+fieldLabel+(field!=='matchs'?' · Total : '+total:'')+'</div>'
    +(rows||'<div style="color:#aaa;padding:20px;text-align:center">Aucune donnée</div>')
    +'</div>'
    +'<div class="mo-foot"><button class="btn-p" onclick="closeModal()">Fermer</button></div>'
  );
}

function setStaffMatchCarton(sid,type,mid){
  var key=sid+'_'+mid;if(!APP.pmd[key])APP.pmd[key]={};var d=APP.pmd[key];
  if(type==='jaune'){d.c_j=!d.c_j;if(d.c_j)d.c_j2=false;}
  else if(type==='dj'){d.c_j2=!d.c_j2;if(d.c_j2)d.c_j=false;}
  else if(type==='rouge'){d.c_r=!d.c_r;}
  var s=APP.staff.find(function(x){return x.id===sid;});
  if(s){s.jaunes=0;s.rouges=0;
    APP.matches.L2.concat(APP.matches.CDF||[]).forEach(function(m){
      var md=APP.pmd[sid+'_'+m.id]||{};
      if(md.c_j)s.jaunes++;if(md.c_j2){s.jaunes+=2;s.rouges++;}if(md.c_r)s.rouges++;
    });}
  renderMPD(mid);try{renderStaffCartons();}catch(e){}
}
function updStaffMatchPMD(sid,mid,field,val){
  var key=sid+'_'+mid;if(!APP.pmd[key])APP.pmd[key]={};APP.pmd[key][field]=val;
}

</script>
