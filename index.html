<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team Manager - Stade de Reims</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{--red:#E8301A;--dark:#1C1C1C;--bg:#F0EEE9;--border:#E2DDD8;--muted:#888;--green:#1a7a3c;--gold:#e6a817;--violet:#7B2D8B}
body{font-family:'Barlow',sans-serif;background:var(--bg);color:#111;font-size:16px;-webkit-font-smoothing:antialiased}
.hdr{background:linear-gradient(110deg,#B82010,#E03018 50%,#CC2814);display:flex;align-items:stretch;min-height:80px}
.hdr-logo{width:90px;background:rgba(0,0,0,.12);display:flex;align-items:center;justify-content:center;flex-shrink:0;padding:6px}
.hdr-logo img{height:64px;width:auto;object-fit:contain;border-radius:4px}
.hdr-sep{width:1px;background:rgba(255,255,255,.2);margin:10px 0}
.hdr-info{padding:14px 18px;flex:1;display:flex;flex-direction:column;justify-content:center}
.hdr-title{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:30px;color:#fff;letter-spacing:2px;text-transform:uppercase;line-height:1}
.hdr-sub{font-size:12px;color:rgba(255,255,255,.65);text-transform:uppercase;letter-spacing:2px;margin-top:4px}
.hdr-right{padding:12px 16px;display:flex;align-items:center;gap:10px}
.season-btn{background:rgba(255,255,255,.12);border:1.5px solid rgba(255,255,255,.35);color:#fff;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;padding:7px 14px;border-radius:20px;cursor:pointer}
.plus-btn{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.18);border:1.5px solid rgba(255,255,255,.4);color:#fff;font-size:22px;display:flex;align-items:center;justify-content:center;cursor:pointer;line-height:1}
.nav{background:#fff;border-bottom:2.5px solid var(--red);display:flex;padding:0 16px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.nb{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:15px;text-transform:uppercase;letter-spacing:1px;padding:14px 14px;border:none;background:none;cursor:pointer;color:var(--muted);border-bottom:3px solid transparent;margin-bottom:-2.5px;display:flex;align-items:center;gap:5px;white-space:nowrap;transition:color .15s}
.nb.active{color:var(--red);border-bottom-color:var(--red)}
.nb.gold-tab{color:var(--gold)}.nb.gold-tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.main{padding:20px}
.page-title{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:36px;text-transform:uppercase;border-left:4px solid var(--red);padding-left:12px;margin-bottom:20px;line-height:1;color:#111}
.tab-row{display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap}
.tab{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px;text-transform:uppercase;letter-spacing:.5px;padding:9px 16px;border:1.5px solid var(--border);border-radius:4px;cursor:pointer;background:#fff;color:var(--muted);display:flex;align-items:center;gap:5px;transition:all .15s}
.tab.active{background:var(--red);color:#fff;border-color:var(--red)}
.tab:hover:not(.active){border-color:var(--red);color:var(--red)}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(90px,1fr));gap:8px;margin-bottom:18px}
.sc{background:#fff;border:1.5px solid var(--border);border-radius:7px;padding:14px 8px;text-align:center}
.sc-val{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:32px;color:var(--red);line-height:1}
.sc-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-top:4px}
.toolbar{display:flex;gap:8px;margin-bottom:16px;align-items:center;flex-wrap:wrap}
.si{flex:1;min-width:140px;padding:10px 13px;border:1.5px solid var(--border);border-radius:6px;font-size:14px;font-family:'Barlow',sans-serif;background:#fff;outline:none;color:#111}
.si:focus{border-color:var(--red)}
.fs{padding:10px 11px;border:1.5px solid var(--border);border-radius:6px;font-size:14px;font-family:'Barlow',sans-serif;background:#fff;outline:none;cursor:pointer;color:#111}
.ab{background:var(--red);color:#fff;border:none;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px;letter-spacing:.5px;text-transform:uppercase;padding:10px 16px;border-radius:6px;cursor:pointer;white-space:nowrap}
.btn-exp{padding:9px 13px;background:var(--green);color:#fff;border:none;border-radius:6px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;text-transform:uppercase;cursor:pointer;letter-spacing:.5px}
.mlist{display:flex;flex-direction:column;gap:5px}
.mi{background:var(--dark);border-radius:6px;display:flex;align-items:center;padding:0 14px;height:58px;cursor:pointer;transition:background .12s}
.mi:hover{background:#2a2a2a}
.mi-j{background:var(--red);color:#fff;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:12px;min-width:34px;height:32px;border-radius:3px;display:flex;align-items:center;justify-content:center;margin-right:12px;flex-shrink:0;padding:0 4px}
.mi-info{flex:1}
.mi-name{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:16px;color:#fff;text-transform:uppercase}
.mi-date{font-size:11px;color:rgba(255,255,255,.45);margin-top:1px}
.mi-score{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:20px;margin-right:10px}
.mi-arr{color:rgba(255,255,255,.3);font-size:13px}
.grp-lbl{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:13px;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin:6px 0 10px;display:inline-block}
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(205px,1fr));gap:12px;margin-bottom:18px}
.pc{position:relative;border-radius:10px;overflow:hidden;cursor:pointer;transition:transform .15s;box-shadow:0 2px 10px rgba(0,0,0,.1)}
.pc:hover{transform:translateY(-3px);box-shadow:0 6px 18px rgba(0,0,0,.15)}
.pc-head{background:linear-gradient(135deg,#130306,#200810 35%,#380d18 65%,#280910);padding:14px;position:relative;display:flex;align-items:center;gap:10px;min-height:72px}
.pc-av{width:46px;height:46px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:20px;color:#fff;flex-shrink:0;z-index:1;overflow:hidden}
.pc-av img{width:100%;height:100%;object-fit:cover}
.pc-num{position:absolute;right:10px;top:5px;color:#fff;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:50px;color:rgba(255,255,255,0.3);line-height:1;pointer-events:none}
.pc-txt{z-index:1;flex:1;min-width:0}
.pc-name{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:16px;color:#fff;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pc-pos{font-size:10px;color:rgba(255,255,255,.45);text-transform:uppercase;letter-spacing:1px;margin-top:4px}
.pc-body{background:transparent;padding:12px 14px 10px;border:1px solid #e0dbd6;border-top:none;border-radius:0 0 8px 8px}
.pc-stats{display:grid;grid-template-columns:repeat(3,1fr);margin-bottom:10px;padding-bottom:9px;border-bottom:1px solid #eee}
.pcs{text-align:center}
.pcs-val{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:24px;color:#1a1a1a;line-height:1}
.pcs-val.r{color:var(--red)}
.pcs-lbl{font-size:9px;color:#aaa;text-transform:uppercase;letter-spacing:1.5px;margin-top:3px;font-weight:700}
.pc-foot{display:flex;align-items:center;justify-content:space-between;gap:4px}
.pc-flag{font-size:15px}
.pc-badge{font-size:11px;background:#f5f2ee;color:#777;padding:3px 9px;border-radius:20px;font-weight:700;border:1px solid #e0dbd6}
.pc-st{font-size:10px;padding:3px 9px;border-radius:20px;font-weight:700}
.s-actif{background:rgba(26,122,60,.1);color:#1a7a3c;border:1px solid rgba(26,122,60,.25)}
.s-pret{background:rgba(230,168,23,.12);color:#9a7010;border:1px solid rgba(230,168,23,.35)}
.s-vendu{background:rgba(232,48,26,.1);color:var(--red);border:1px solid rgba(232,48,26,.25)}
.s-blesse{background:rgba(100,100,100,.1);color:#666;border:1px solid rgba(100,100,100,.25)}
.sgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(215px,1fr));gap:11px;margin-bottom:20px}
.scard{background:var(--dark);border-radius:7px;overflow:hidden;cursor:pointer;transition:transform .15s;box-shadow:0 2px 8px rgba(0,0,0,.12)}
.scard:hover{transform:translateY(-2px)}
.scard-hd{background:linear-gradient(135deg,#111,#252525);padding:14px;display:flex;align-items:center;gap:11px}
.scard-av{width:46px;height:46px;border-radius:50%;background:#3a3a3a;border:2px solid rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:15px;color:#fff;flex-shrink:0}
.scard-name{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:14px;color:#fff;text-transform:uppercase}
.scard-role{font-size:10px;color:rgba(255,255,255,.45);text-transform:uppercase;letter-spacing:1px;margin-top:2px}
.scard-ft{padding:9px 14px;border-top:1px solid rgba(255,255,255,.07);font-size:12px;color:rgba(255,255,255,.45)}
.tbl{width:100%;border-collapse:separate;border-spacing:0;font-size:14px}
.tbl th{background:var(--dark);color:rgba(255,255,255,.8);font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;text-transform:uppercase;letter-spacing:1px;padding:12px 13px;text-align:left;white-space:nowrap;border-bottom:2px solid rgba(255,255,255,.1)}
.tbl th.r{color:#f87171}.tbl th.g{color:#4ade80}.tbl th.v{color:#c084fc}.tbl th.gold{color:var(--gold)}
.tbl td{padding:11px 13px;border-bottom:1px solid var(--border);vertical-align:middle;font-size:14px;color:#222;background:#fff}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:#fdf8f7}
.nbadge{width:30px;height:30px;border-radius:50%;background:var(--red);color:#fff;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:13px;display:inline-flex;align-items:center;justify-content:center}
.grp-row td{background:#f0ede8!important;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:12px;text-transform:uppercase;letter-spacing:2px;color:var(--muted);padding:7px 13px}
.pos-pill{font-size:11px;background:var(--bg);color:#666;padding:3px 9px;border-radius:20px;border:1px solid var(--border);white-space:nowrap;font-weight:600}
.box{background:#fff;border-radius:7px;overflow:hidden;border:1.5px solid var(--border)}
.box-hdr{background:var(--dark);padding:11px 14px;display:flex;justify-content:space-between;align-items:center}
.box-hdr-t{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:14px;text-transform:uppercase;letter-spacing:1.5px;color:#fff}
.scroll-x{display:block;width:100%;overflow-x:scroll;-webkit-overflow-scrolling:touch}
.dtbl{border-collapse:separate;border-spacing:0;font-size:13px;width:auto;min-width:100%}
.dtbl th{background:var(--dark);color:rgba(255,255,255,.7);font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:1px;padding:10px 7px;text-align:center;white-space:nowrap;border-bottom:2px solid rgba(255,255,255,.1)}
.dtbl th.stk{position:sticky;z-index:4;background:var(--dark)}
.dtbl th.sk0{left:0;min-width:38px;text-align:center}
.dtbl th.sk1{left:38px;min-width:145px;text-align:left;border-right:2px solid rgba(255,255,255,.15)}
.dtbl td{padding:9px 7px;border-bottom:1px solid var(--border);text-align:center;vertical-align:middle;white-space:nowrap;background:#fff;color:#222;min-width:44px}
.dtbl td.stk{position:sticky;z-index:2;background:#fff}
.dtbl td.sk0{left:0;min-width:38px;text-align:center}
.dtbl td.sk1{left:38px;min-width:145px;text-align:left;font-weight:700;border-right:2px solid #e0dbd6}
.dtbl tr:hover td{background:#fdf8f7}.dtbl tr:hover td.stk{background:#fdf8f7}
.dtbl th.v-h{color:#c084fc}
.yc{display:inline-flex;align-items:center;justify-content:center;width:16px;height:20px;background:#FFD700;border-radius:2px;vertical-align:middle;margin:0 1px;font-size:10px;font-weight:900;color:rgba(0,0,0,0.6);font-family:Barlow Condensed,sans-serif;min-width:14px}
.rc{display:inline-flex;align-items:center;justify-content:center;width:16px;height:20px;background:var(--red);border-radius:2px;vertical-align:middle;margin:0 1px;font-size:10px;font-weight:900;color:rgba(255,255,255,0.9);font-family:Barlow Condensed,sans-serif;min-width:14px}
.sc2{background:#111;color:#fff;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:11px;border-radius:3px;padding:2px 5px;cursor:pointer;display:inline-block}
.rcrd{background:#fff;border:1.5px solid var(--border);border-radius:7px;padding:14px;text-align:center}
.rval{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:30px;color:var(--red);line-height:1}
.rval.sm{font-size:18px}.rlbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-top:5px}
.sm{background:#f5f3ef;border-radius:5px;padding:12px;text-align:center;border-top:3px solid var(--red)}
.sm-val{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:24px;color:var(--red)}
.sm-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-top:3px}
.sec-hdr{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:15px;text-transform:uppercase;letter-spacing:1px;margin:14px 0 8px;padding-bottom:5px;border-bottom:1.5px solid var(--border);color:#111}
.alert-card{background:#fff;border-left:5px solid var(--gold);border-radius:7px;padding:14px 18px;margin-bottom:10px;display:flex;align-items:center;gap:14px;box-shadow:0 2px 6px rgba(0,0,0,.07)}
.alert-card.crit{border-left-color:var(--red)}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:center;justify-content:center;padding:14px;overflow-y:auto}
.mo{background:#fff;border-radius:10px;width:100%;max-width:720px;max-height:92vh;overflow-y:auto;margin:auto}
.mo-hdr{background:linear-gradient(110deg,#B82010,var(--red));padding:16px 20px;border-radius:10px 10px 0 0;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.mo-title{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:21px;color:#fff;text-transform:uppercase;letter-spacing:1px}
.mo-x{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.18);border:none;color:#fff;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.mo-body{padding:20px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.fg{display:flex;flex-direction:column;gap:5px}.fg.full{grid-column:1/-1}
.fl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted)}
.fi{padding:10px 12px;border:1.5px solid var(--border);border-radius:5px;font-size:14px;font-family:'Barlow',sans-serif;outline:none;width:100%;color:#111}
.fi:focus{border-color:var(--red)}
.fsel{padding:10px 12px;border:1.5px solid var(--border);border-radius:5px;font-size:14px;font-family:'Barlow',sans-serif;outline:none;background:#fff;cursor:pointer;width:100%;color:#111}
.mo-foot{display:flex;justify-content:flex-end;gap:8px;padding:12px 20px;border-top:1.5px solid var(--border);position:sticky;bottom:0;background:#fff}
.btn-c{padding:9px 18px;border:1.5px solid var(--border);background:#fff;border-radius:5px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px;text-transform:uppercase;cursor:pointer;color:#333}
.btn-d{padding:9px 18px;border:1.5px solid var(--red);background:#fff;color:var(--red);border-radius:5px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px;text-transform:uppercase;cursor:pointer}
.btn-p{padding:9px 18px;background:var(--red);color:#fff;border:none;border-radius:5px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px;text-transform:uppercase;cursor:pointer}
.chip-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin-bottom:8px}
.chip{display:flex;align-items:center;gap:5px;padding:6px 8px;border:1.5px solid var(--border);border-radius:4px;cursor:pointer;background:#fff;transition:all .12s}
.chip.sel{border-color:var(--red);background:#FFF0F0}
.chip-n{width:22px;height:22px;border-radius:50%;background:var(--red);color:#fff;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.chip-nm{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:10px;text-transform:uppercase;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.det-in{width:56px;padding:4px 6px;border:1.5px solid var(--border);border-radius:4px;font-size:13px;text-align:center;font-family:'Barlow',sans-serif;color:#111}
.det-in:focus{border-color:var(--red);outline:none}
.crtn-btn{padding:5px 9px;border-radius:4px;cursor:pointer;font-size:12px;font-weight:700;border:1.5px solid transparent;transition:all .1s;font-family:'Barlow Condensed',sans-serif}
.crtn-j{background:#fffbeb;color:#856404;border-color:#ffd700}.crtn-j.on{background:#FFD700;color:#000}
.crtn-dj{background:#fff0f0;color:#800000;border-color:#800000;font-size:11px}.crtn-dj.on{background:#800000;color:#fff}
.crtn-r{background:#fff0f0;color:var(--red);border-color:var(--red)}.crtn-r.on{background:var(--red);color:#fff}
.min-in{width:42px;padding:4px 5px;border:1.5px solid var(--border);border-radius:4px;font-size:12px;text-align:center;font-family:'Barlow',sans-serif;color:#111}
.min-in:focus{border-color:var(--red);outline:none}
.ed-cell{cursor:pointer}.ed-cell:hover{background:rgba(232,48,26,.05)!important}
.hidden{display:none}

.live-btn{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:14px;text-transform:uppercase;letter-spacing:1px;padding:9px 20px;border:none;border-radius:6px;cursor:pointer;background:#333;color:#fff;transition:all .15s}
.live-btn.green{background:#1a5c30}
.live-btn.orange{background:#c05000}
.live-btn.red{background:var(--red)}
.live-btn:active{transform:scale(.97)}
.live-act-btn{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:14px;text-transform:uppercase;letter-spacing:1px;padding:12px 10px;border:none;border-radius:6px;cursor:pointer;transition:all .15s;text-align:center}
.live-act-btn:active{transform:scale(.97)}


@keyframes goalBounce{0%{transform:scale(0.3) translateY(60px);opacity:0}60%{transform:scale(1.2) translateY(-10px);opacity:1}80%{transform:scale(.95)}100%{transform:scale(1) translateY(0);opacity:1}}
@keyframes livePulse{0%,100%{opacity:1}50%{opacity:.6}}
@keyframes fadeInDown{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}

.pc-pret   { border:3px solid #3b82f6 !important; }





</style>
</head>
<body>

<script>

// ═══════════════════════════════════════════════════════════════════
// SUPABASE SYNC — REST API polling
// IMPORTANT: Ce fichier doit être hébergé sur HTTPS pour fonctionner
// Recommandé: Netlify Drop (gratuit, 30 secondes)
// ═══════════════════════════════════════════════════════════════════
var _SB = {
  url: '', key: '', enabled: false,
  uid: 'u' + Math.random().toString(36).substr(2, 6),
  saveTimer: null, pollTimer: null,
  loading: false, saving: false,
  roomId: '', lastTs: 0,
  table: 'team_data'
};

function sbGetRoomId() {
  var h = (window.location.hash || '').replace('#', '').trim();
  if (h.length > 3) return h;
  var id = 'sdr_' + Math.random().toString(36).substr(2, 8);
  try { window.location.hash = id; } catch (e) {}
  return id;
}

function sbStatus(s, detail) {
  var el = document.getElementById('sb-status');
  if (!el) return;
  var map = {
    'off':     ['⚫ Sync désactivée', '#888'],
    'connect': ['🔄 Connexion...', '#e6a817'],
    'online':  ['🟢 En ligne · sync 5s', '#1a7a3c'],
    'saved':   ['💾 Sauvegardé', '#1a7a3c'],
    'synced':  ['✅ Synchronisé', '#1a7a3c'],
    'offline': ['🔴 Hors ligne', '#C82010'],
    'error':   ['⚠️ Erreur config', '#C82010'],
    'hosting': ['⚠️ Hébergement requis', '#e6a817']
  };
  var cfg = map[s] || [s, '#888'];
  el.textContent = cfg[0] + (detail ? ' — ' + detail : '');
  el.style.color = cfg[1];
}

function sbIsSecure() {
  var proto = window.location.protocol;
  return proto === 'https:' || proto === 'http:';
}

function sbFetch(method, path, body) {
  var headers = {
    'apikey': _SB.key,
    'Authorization': 'Bearer ' + _SB.key,
    'Content-Type': 'application/json',
    'Prefer': 'return=representation'
  };
  var opts = { method: method, headers: headers };
  if (body) opts.body = JSON.stringify(body);
  return fetch(_SB.url + '/rest/v1/' + path, opts).then(function(r) {
    if (!r.ok) return r.text().then(function(t) { throw new Error(r.status + ': ' + t.substr(0,200)); });
    return r.text().then(function(t) { return t ? JSON.parse(t) : null; });
  });
}

function sbSave() {
  if (!_SB.enabled || _SB.loading || _SB.saving) return;
  clearTimeout(_SB.saveTimer);
  _SB.saveTimer = setTimeout(function() {
    _SB.saving = true;
    var ts = Date.now();
    var row = {
      room_id: _SB.roomId, uid: _SB.uid, ts: ts,
      season: APP.season || '', champ_name: APP.champName || '',
      players: JSON.stringify(APP.players || []),
      staff: JSON.stringify(APP.staff || []),
      matches_l2: JSON.stringify(APP.matches.L2 || []),
      matches_cdf: JSON.stringify(APP.matches.CDF || []),
      matches_ami: JSON.stringify(APP.matches.AMI || []),
      pmd: JSON.stringify(APP.pmd || {})
    };
    sbFetch('POST', _SB.table + '?on_conflict=room_id', [row]).then(function() {
      _SB.lastTs = ts; _SB.saving = false;
      sbStatus('saved'); setTimeout(function() { sbStatus('online'); }, 1500);
    }).catch(function(e) {
      _SB.saving = false;
      sbFetch('PATCH', _SB.table + '?room_id=eq.' + encodeURIComponent(_SB.roomId), row)
        .then(function() { _SB.lastTs = ts; sbStatus('saved'); setTimeout(function() { sbStatus('online'); }, 1500); })
        .catch(function(e2) { console.error('SB save:', e2.message); sbStatus('error'); });
    });
  }, 700);
}

function sbPoll() {
  if (!_SB.enabled || _SB.loading || _SB.saving) return;
  sbFetch('GET', _SB.table + '?room_id=eq.' + encodeURIComponent(_SB.roomId) + '&select=*')
    .then(function(rows) {
      if (!rows || !rows.length) return;
      var row = rows[0];
      if (row.ts > _SB.lastTs && row.uid !== _SB.uid) { _SB.lastTs = row.ts; sbApply(row); }
    }).catch(function() {});
}

function sbApply(row) {
  _SB.loading = true;
  try {
    if (row.players)     APP.players = JSON.parse(row.players) || [];
    if (row.staff)       APP.staff = JSON.parse(row.staff) || [];
    if (row.matches_l2)  APP.matches.L2 = JSON.parse(row.matches_l2) || [];
    if (row.matches_cdf) APP.matches.CDF = JSON.parse(row.matches_cdf) || [];
    if (row.matches_ami) APP.matches.AMI = JSON.parse(row.matches_ami) || [];
    if (row.pmd)         APP.pmd = JSON.parse(row.pmd) || {};
    if (row.season)      APP.season = row.season;
    if (row.champ_name)  APP.champName = row.champ_name;
    sbRefreshUI(); sbStatus('synced');
    setTimeout(function() { sbStatus('online'); }, 2000);
  } catch(e) { console.error('SB apply:', e); }
  _SB.loading = false;
}

function sbRefreshUI() {
  var el;
  el = document.getElementById('season-display'); if (el) el.textContent = (APP.season||'')+' \u25bc';
  el = document.getElementById('season-label'); if (el) el.textContent = 'Stade de Reims \u00b7 Saison '+(APP.season||'');
  el = document.getElementById('champ-tab-lbl'); if (el) el.textContent = 'Championnat '+(APP.champName||'');
  el = document.getElementById('carton-champ-lbl'); if (el) el.textContent = APP.champName||'';
  document.querySelectorAll('[id^="page-"]').forEach(function(pg) {
    if (pg.classList.contains('hidden')) return;
    var pid = pg.id.replace('page-','');
    try {
      if (pid==='joueurs') renderPlayers();
      else if (pid==='staff') renderStaff();
      else if (pid==='cartons') renderCartons();
      else if (pid==='recap') renderRecap();
      else if (pid==='passeport') renderPassportAlerts();
      else { renderCompStats(); renderMatchList(); }
    } catch(e) {}
  });
}

function sbInit(url, key) {
  // Check if running from file:// — won't work
  if (!sbIsSecure()) {
    sbStatus('hosting');
    sbShowHostingHelp();
    return;
  }
  _SB.url = url.replace(/\/$/, '');
  _SB.key = key;
  _SB.roomId = sbGetRoomId();
  _SB.enabled = true;
  sbStatus('connect');
  sbFetch('GET', _SB.table + '?room_id=eq.' + encodeURIComponent(_SB.roomId) + '&select=*')
    .then(function(rows) {
      if (rows && rows.length) {
        var row = rows[0]; _SB.lastTs = row.ts || 0;
        if (row.uid !== _SB.uid) sbApply(row); else sbStatus('online');
      } else { sbSave(); sbStatus('online'); }
      clearInterval(_SB.pollTimer);
      _SB.pollTimer = setInterval(sbPoll, 5000);
      var lnk = document.getElementById('sb-room-link');
      if (lnk) lnk.textContent = '🔗 ' + _SB.roomId;
    }).catch(function(e) {
      console.error('sbInit:', e.message);
      sbStatus('error');
      alert('Erreur Supabase : ' + e.message + '\n\nVérifiez URL, clé anon et que la table existe.');
    });
}

function sbShowHostingHelp() {
  openModal(
    '<div class="mo-hdr"><div class="mo-title">⚠️ Hébergement requis</div>' +
    '<button class="mo-x" onclick="closeModal()">✕</button></div>' +
    '<div class="mo-body">' +
    '<p style="font-size:15px;line-height:1.7;margin-bottom:14px;color:#333">' +
    'La synchronisation Supabase nécessite que le fichier soit hébergé sur <strong>HTTPS</strong>.<br>' +
    'Depuis un fichier local (<code>file://</code>), iOS Safari bloque les requêtes réseau.</p>' +

function sbSetup() {
  // If file://, show hosting help first
  if (!sbIsSecure()) {
    sbShowHostingHelp();
    return;
  }
  openModal(
    '<div class="mo-hdr"><div class="mo-title">⚡ Config Supabase</div>' +
    '<button class="mo-x" onclick="closeModal()">✕</button></div>' +
    '<div class="mo-body">' +
    '<div style="background:#f0fdf4;border-radius:8px;padding:14px;margin-bottom:14px;font-size:13px;line-height:1.9;color:#166534">' +
    '<strong>📋 Étapes :</strong><br>' +
    '① <a href="https://supabase.com" target="_blank" style="color:#16a34a;font-weight:700">supabase.com</a> → New project<br>' +
    '② SQL Editor → coller + exécuter le SQL ci-dessous<br>' +
    '③ Settings → API → copier URL et anon key' +
    '</div>' +
    '<div style="background:#1e1e1e;border-radius:6px;padding:12px;margin-bottom:14px;' +
    'font-family:monospace;font-size:11px;color:#4ade80;line-height:1.7;overflow-x:auto;white-space:pre;cursor:pointer" ' +
    'onclick="var r=document.createRange();r.selectNode(this);window.getSelection().removeAllRanges();window.getSelection().addRange(r);">' +
    'CREATE TABLE IF NOT EXISTS team_data (\n' +
    '  room_id TEXT PRIMARY KEY,\n' +
    '  uid TEXT, ts BIGINT,\n' +
    '  season TEXT, champ_name TEXT,\n' +
    '  players TEXT, staff TEXT,\n' +
    '  matches_l2 TEXT, matches_cdf TEXT,\n' +
    '  matches_ami TEXT, pmd TEXT\n' +
    ');\n' +
    'ALTER TABLE team_data ENABLE ROW LEVEL SECURITY;\n' +
    'CREATE POLICY "allow_all" ON team_data\n' +
    '  FOR ALL TO anon USING (true) WITH CHECK (true);\n' +
    '-- Cliquer pour tout selectionner' +
    '</div>' +
    '<div class="frow">' +
    '<div class="fg"><label class="fl">Project URL</label>' +
    '<input class="fi" id="sb-url" placeholder="https://xxxx.supabase.co"></div>' +
    '<div class="fg"><label class="fl">Anon Public Key</label>' +
    '<input class="fi" id="sb-key" placeholder="eyJhbGci..."></div>' +
    '</div>' +
    '</div>' +
    '<div class="mo-foot">' +
    '<button class="btn-c" onclick="closeModal()">Annuler</button>' +
    '<button class="btn-p" onclick="sbActivate()" style="background:#16a34a">⚡ Activer</button>' +
    '</div>'
  );
  try {
    var saved = localStorage.getItem('sb_config');
    if (saved) {
      var cfg = JSON.parse(saved);
      var u = document.getElementById('sb-url'), k = document.getElementById('sb-key');
      if (u && cfg.url) u.value = cfg.url;
      if (k && cfg.key) k.value = cfg.key;
    }
  } catch(e) {}
}

function sbActivate() {
  var url = ((document.getElementById('sb-url')||{}).value||'').trim();
  var key = ((document.getElementById('sb-key')||{}).value||'').trim();
  if (!url || !key) { alert('URL et clé requises'); return; }
  if (!url.startsWith('https://')) { alert('URL invalide — doit commencer par https://'); return; }
  try { localStorage.setItem('sb_config', JSON.stringify({url:url, key:key})); } catch(e) {}
  closeModal();
  sbInit(url, key);
}

function sbCopyLink() {
  var url = window.location.href;
  if (navigator && navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(url)
      .then(function() { alert('\u2705 Lien copié !\n\n' + url + '\n\nEnvoie ce lien à ton collègue.'); })
      .catch(function() { prompt('Copie ce lien :', url); });
  } else { prompt('Copie ce lien :', url); }
}

function sbWrap() {
  var names = ['updPMD','setCarton','toggleSusp','savePlayer','saveMatch',
               'addMatch','saveStaff','staffC2','staffS2','staffMin2','createNewSeason'];
  names.forEach(function(name) {
    var orig = window[name];
    if (typeof orig === 'function') {
      window[name] = function() { var r = orig.apply(this,arguments); sbSave(); return r; };
    }
  });
  var origRR = window.renderRecap;
  if (typeof origRR === 'function') {
    window.renderRecap = function() { origRR.apply(this,arguments); sbSave(); };
  }
}

document.addEventListener('DOMContentLoaded', function() {
  sbStatus('off');
  sbWrap();
  // Show hosting warning if on file://
  if (!sbIsSecure()) {
    sbStatus('hosting');
    var bar = document.getElementById('sb-bar');
    if (bar) {
      var warn = document.createElement('div');
      warn.style.cssText = 'background:#7c3a00;color:#fed7aa;padding:5px 18px;font-size:12px;' +
        'font-family:Barlow Condensed,sans-serif;font-weight:700;cursor:pointer;text-align:center;letter-spacing:.5px';
      warn.textContent = '⚠️ Fichier local détecté — héberge sur Netlify pour activer la sync. Cliquer pour voir comment →';
      warn.onclick = sbShowHostingHelp;
      bar.parentNode.insertBefore(warn, bar.nextSibling);
    }
  } else {
    // HTTPS — try to restore saved config
    try {
      var saved = localStorage.getItem('sb_config');
      if (saved) {
        var cfg = JSON.parse(saved);
        if (cfg && cfg.url && cfg.key) sbInit(cfg.url, cfg.key);
      }
    } catch(e) { console.warn('SB restore:', e); }
  }
});

</script>

function clearAllMatchData() {
  // Clear all pmd (stats, cartons, minutes per match)
  APP.pmd = {};
  // Reset player stats
  APP.players.forEach(function(p) {
    p.l2_matchs=0;p.l2_tit=0;p.l2_rempl=0;p.l2_min=0;p.l2_buts=0;
    p.cdf_matchs=0;p.cdf_tit=0;p.cdf_rempl=0;p.cdf_min=0;p.cdf_buts=0;
  });
  // Reset staff sanctions
  APP.staff.forEach(function(s){s.jaunes=0;s.rouges=0;s.susp=0;});
  // Reset match scores (keep match structure)
  ['L2','CDF','AMI'].forEach(function(comp){
    (APP.matches[comp]||[]).forEach(function(m){ m.score='';m.res=''; });
  });
  // Refresh all
  try{renderCompStats();}catch(e){}
  try{renderMatchList();}catch(e){}
  try{renderRecap();}catch(e){}
  try{renderCartons();}catch(e){}
  try{renderStaff();}catch(e){}
}

function showPage(page, btn) {

  if (pg) pg.classList.remove('hidden');

  if (btn) btn.classList.add('active');

function switchComp(c, tab) {
  curComp = c;
  document.querySelectorAll('#page-competitions .tab').forEach(function(t){ t.classList.remove('active'); });
  if (tab) tab.classList.add('active');
  renderCompStats(); renderMatchList();
}

function getRes(score, name) {
  if (!score) return 'upcoming';
  var p = score.split(' ')[0].split('-');
  if (p.length < 2) return 'upcoming';
  var h = name.toUpperCase().indexOf('SDR') === 0;
  var a = parseInt(p[0])||0, b = parseInt(p[1])||0;
  var s = h?a:b, o = h?b:a;
  return s>o ? 'win' : s<o ? 'loss' : 'draw';
}

var SC = {win:'#22c55e', draw:'#e6a817', loss:'#ef4444'};

function renderCompStats() {
  var ms = APP.matches[curComp];
  var w=0, d=0, l=0, gf=0, ga=0;
  ms.forEach(function(m) {
    if (!m.score) return;
    var r = m.res || getRes(m.score, m.name);
    var p = m.score.split(' ')[0].split('-');
    if (p.length >= 2) {
      var h = m.name.toUpperCase().indexOf('SDR')===0;
      var a=parseInt(p[0])||0, b=parseInt(p[1])||0;
      gf += h?a:b; ga += h?b:a;
    }
    if (r==='win') w++; else if (r==='draw') d++; else if (r==='loss') l++;
  });
  var played = ms.filter(function(m){ return m.score; }).length;
  var el = document.getElementById('comp-stats');
  if (!el) return;

  if (curComp === 'CDF') {
    var q = APP.matches.CDF.filter(function(m){ return m.score && (m.res||getRes(m.score,m.name))==='win'; }).length;
    var e = APP.matches.CDF.filter(function(m){ return m.score && (m.res||getRes(m.score,m.name))==='loss'; }).length;
    el.innerHTML =
      '<div class="sc" style="grid-column:span 2"><div class="sc-val">'+played+'/'+ms.length+'</div><div class="sc-lbl">Tours joués</div></div>'+
      '<div class="sc" style="grid-column:span 2"><div class="sc-val" style="color:var(--green)">'+q+'</div><div class="sc-lbl">Qualifications</div></div>'+
      '<div class="sc" style="grid-column:span 2"><div class="sc-val" style="color:var(--red)">'+e+'</div><div class="sc-lbl">Éliminations</div></div>'+
      '<div class="sc"><div class="sc-val">'+gf+'</div><div class="sc-lbl">Buts</div></div>';

  } else if (curComp === 'AMI') {
    // Amical : no points — show top scorer instead
    var topScorer = null, topButs = 0;
    APP.players.forEach(function(p) {
      APP.matches.AMI.forEach(function(m) {
        var d2 = (APP.pmd||{})[p.id+'_'+m.id]||{};
        if ((d2.buts||0) > topButs) { topButs = d2.buts||0; topScorer = p; }
      });
    });
    var topHtml = topScorer
      ? '<span style="font-size:16px;font-weight:800">'+topScorer.name+'</span><br><span style="font-size:12px;color:#888">'+topButs+' but'+(topButs>1?'s':'')+'</span>'
      : '<span style="font-size:14px;color:#aaa">–</span>';
    el.innerHTML =
      '<div class="sc"><div class="sc-val">'+played+'/'+ms.length+'</div><div class="sc-lbl">Joués</div></div>'+
      '<div class="sc"><div class="sc-val">'+w+'</div><div class="sc-lbl">Victoires</div></div>'+
      '<div class="sc"><div class="sc-val">'+d+'</div><div class="sc-lbl">Nuls</div></div>'+
      '<div class="sc"><div class="sc-val">'+l+'</div><div class="sc-lbl">Défaites</div></div>'+
      '<div class="sc"><div class="sc-val">'+gf+'</div><div class="sc-lbl">Buts Pour</div></div>'+
      '<div class="sc"><div class="sc-val">'+ga+'</div><div class="sc-lbl">Buts Contre</div></div>'+
      '<div class="sc" style="grid-column:span 2"><div class="sc-val" style="font-size:14px;line-height:1.3">'+topHtml+'</div><div class="sc-lbl">Top Buteur</div></div>';

  } else {
    // L2 : show points
    el.innerHTML =
      '<div class="sc"><div class="sc-val">'+played+'/'+ms.length+'</div><div class="sc-lbl">Joués</div></div>'+
      '<div class="sc"><div class="sc-val">'+w+'</div><div class="sc-lbl">Victoires</div></div>'+
      '<div class="sc"><div class="sc-val">'+d+'</div><div class="sc-lbl">Nuls</div></div>'+
      '<div class="sc"><div class="sc-val">'+l+'</div><div class="sc-lbl">Défaites</div></div>'+
      '<div class="sc"><div class="sc-val">'+gf+'</div><div class="sc-lbl">Buts Pour</div></div>'+
      '<div class="sc"><div class="sc-val">'+ga+'</div><div class="sc-lbl">Buts Contre</div></div>'+
      '<div class="sc"><div class="sc-val">'+(w*3+d)+'</div><div class="sc-lbl">Points</div></div>';
  }
}


function renderMatchList() {
  var ms = APP.matches[curComp];
  var isCDF = curComp==='CDF';
  var el = document.getElementById('match-list');
  if (!el) return;
  el.innerHTML = ms.map(function(m) {
    var r = m.res||getRes(m.score,m.name);
    var sc = '';
    if (m.score) {
      if (isCDF) {
        var q = r==='win';
        sc = '<span style="font-size:12px;padding:3px 9px;border-radius:12px;font-weight:700;margin-right:8px;background:'+(q?'rgba(26,122,60,.8)':'rgba(200,16,46,.8)')+';color:#fff">'+(q?'✅ QUALIFIÉ':'❌ ÉLIMINÉ')+'</span><span class="mi-score" style="color:'+(SC[r]||'#aaa')+'">'+m.score+'</span>';
      } else {
        sc = '<span class="mi-score" style="color:'+(SC[r]||'#aaa')+'">'+m.score+'</span>';
      }
    } else {
      sc = '<span style="color:rgba(255,255,255,.3);font-size:13px;margin-right:10px">à venir</span>';
    }
    return '<div class="mi" onclick="showMatchModal(\''+m.id+'\')">'+'<div class="mi-j">'+m.j+'</div>'+'<div class="mi-info"><div class="mi-name">'+m.name+'</div><div class="mi-date">'+(m.date||'')+'</div></div>'+sc+'<span class="mi-arr">▼</span></div>';
  }).join('');
}

    if (fPos!=='all' && p.pos!==fPos) return false;

    return true;
  });
  // Sort list
  if (fSort==='name') list.sort(function(a,b){return (a.name||'').localeCompare(b.name||'');});
  else if (fSort==='pos') list.sort(function(a,b){return (a.pos||'').localeCompare(b.pos||'');});
  else list.sort(function(a,b){return parseInt(a.num||999)-parseInt(b.num||999);});
  var groups = [];
  list.forEach(function(p){ if (groups.indexOf(p.group)<0) groups.push(p.group); });
  var html = '';
  groups.forEach(function(g) {
    var gp = list.filter(function(p){ return p.group===g; });
    html += '<div class="grp-lbl">'+g+'</div><div class="pgrid">';
    gp.forEach(function(p) {
      var st = p.status||'actif';
      var tm=0,tM=0,tB=0;
      APP.matches.L2.concat(APP.matches.CDF).forEach(function(m){
        var d=(APP.pmd||{})[p.id+'_'+m.id]||{};
        if(d.statut==='T'||d.statut==='R'){tm++;tM+=(d.min||0);tB+=(d.buts||0);}
      });
      var ph = p.photo ? '<img src="'+p.photo+'">' : (p.name[0]||'?');
      html += '<div class="pc" data-pid="'+p.id+'" onclick="if(!event.target.closest(\'[data-edit-btn]\'))showPlayerModal(\''+p.id+'\')"><div class="pc-head"><div class="pc-av">'+ph+'</div><div class="pc-txt"><div class="pc-name">'+p.name+'</div><div class="pc-pos">'+p.pos+'</div></div><div class="pc-num">'+p.num+'</div></div><div class="pc-body"><div class="pc-stats"><div class="pcs"><div class="pcs-val">'+tm+'</div><div class="pcs-lbl">Matchs</div></div><div class="pcs"><div class="pcs-val'+(tB>0?' r':'')+'">'+tB+'</div><div class="pcs-lbl">Buts</div></div><div class="pcs"><div class="pcs-val">'+tM+'</div><div class="pcs-lbl">Min</div></div></div><div class="pc-foot"><span class="pc-flag">'+(p.nat||'')+'</span><span class="pc-badge">'+p.group+'</span><span class="pc-st s-'+st+'">'+st+'</span></div></div></div>';
    });
    html += '</div>';
  });
  var c = document.getElementById('players-container');
  if (c) c.innerHTML = html;
}

  var allMatches = APP.matches.L2.map(function(m){return Object.assign({},m,{comp:'L2'});})

  var body = '';

    var tJ=0,tR=0,tS=0;

    rounds.forEach(function(m) {

      var d = APP.pmd[key]||{};

      if(d.suspension){cell='<span class="sc2">S</span>';tS++;}

      else if(d.carton==='jaune'){cell='<span class="yc">'+(d.carton_num||'')+'</span>';tJ++;}

        +(cell||'<span style="color:#ddd;font-size:14px">·</span>')+'</td>';

      +'<td class="stk sk0"><div class="nbadge" style="background:#444">'+s.init+'</div></td>'

// ── CARTONS ──────────────────────────────────────────────────────────────────
function setCartonComp(comp, tab) {
  fCComp = comp;
  document.querySelectorAll('#page-cartons .tab').forEach(function(t){ t.classList.remove('active'); });
  if (tab) tab.classList.add('active');
  var lbl = document.getElementById('carton-champ-lbl');
  if(lbl) lbl.textContent = APP.champName||'L2';
  renderCartons();
}

function renderCartons() {
  var lbl = document.getElementById('carton-champ-lbl');
  if(lbl) lbl.textContent = APP.champName||'L2';
  var l2R = APP.matches.L2.map(function(m){ return {j:m.j,name:m.name,adv:m.adv||'',id:m.id,comp:'L2'}; });
  var cdfR = APP.matches.CDF.map(function(m){ return {j:m.j,name:m.name,adv:m.adv||'',id:m.id,comp:'CDF'}; });
  var rounds = [];
  if (fCComp === 'L2') {
    rounds = l2R;
  } else if (fCComp === 'CDF') {
    rounds = cdfR;
  } else {
    // 'all': merge by date, then by journée number
    var all = l2R.concat(cdfR);
    all.sort(function(a, b) {
      var ma = APP.matches.L2.concat(APP.matches.CDF).find(function(x){return x.id===a.id;});
      var mb = APP.matches.L2.concat(APP.matches.CDF).find(function(x){return x.id===b.id;});
      var da = (ma&&ma.date) ? ma.date : '';
      var db = (mb&&mb.date) ? mb.date : '';
      if (da && db && da !== db) return da < db ? -1 : 1;
      // fallback: journée number
      var na = parseInt((a.j||'').replace(/[^0-9]/g,''))||999;
      var nb = parseInt((b.j||'').replace(/[^0-9]/g,''))||999;
      return na - nb;
    });
    rounds = all;
  }
  var players = APP.players.filter(function(p){ return !fCSearch||p.name.toLowerCase().indexOf(fCSearch)>=0; });

  var hdr = '<th class="stk sk0">#</th><th class="stk sk1">Joueur</th>';
  rounds.forEach(function(r){
    hdr += '<th style="min-width:52px;padding:8px 5px" title="'+r.name+'">'+
      '<div style="display:flex;align-items:center;gap:3px;justify-content:center">'+r.j+
      (fCComp==='all'?'<span style="font-size:8px;background:'+(r.comp==='CDF'?'#f59e0b':'#3b82f6')+';color:#fff;border-radius:3px;padding:1px 3px">'+r.comp+'</span>':'')+
      '</div>'+
      '<div style="font-size:9px;opacity:.55;font-weight:400;max-width:50px;overflow:hidden;text-overflow:ellipsis">'+r.adv+'</div></th>';
  });
  hdr += '<th style="color:var(--gold);min-width:46px">Tot.J</th><th style="color:var(--red);min-width:46px">Tot.R</th><th class="v-h" style="min-width:46px">Tot.S</th>';

  var body = '';
  players.forEach(function(p) {
    var tJ=0,tR=0,tS=0;
    var cells = '';
    rounds.forEach(function(r) {
      var key = p.id+'_'+r.id;
      var d = APP.pmd[key]||{};
      var cell = '';
      if(d.suspension){cell='<span class="sc2">S</span>';tS++;}
      else{
        var parts2=[];
        if(d.c_j){parts2.push('<span class="yc">'+(d.carton_num||'')+'</span>');tJ++;}
        if(d.c_j2){parts2.push('<span class="yc">'+(d.carton_num||'')+'</span><span class="rc" style="margin-left:1px"></span>');tJ+=2;tR++;}
        if(d.c_r){parts2.push('<span class="rc">'+(d.carton_num||'')+'</span>');tR++;}
        if(!parts2.length){
          if(d.carton==='dj'){parts2.push('<span class="yc">'+(d.carton_num||'')+'</span><span class="rc" style="margin-left:1px"></span>');tJ+=2;tR++;}
          else if(d.carton==='rouge'){parts2.push('<span class="rc">'+(d.carton_num||'')+'</span>');tR++;}
          else if(d.carton==='jaune'){parts2.push('<span class="yc">'+(d.carton_num||'')+'</span>');tJ++;}
        }
        if(parts2.length)cell=parts2.join('');
      }
      var cKey = p.id+'_'+r.id;
      cells += '<td onclick="showSanctionMenu(event,\''+cKey+'\',\'renderCartons\')" '+
        'style="cursor:pointer;min-width:44px;text-align:center">' +
        (cell||'<span style="color:#ddd;font-size:14px">·</span>') + '</td>';
    });
    body += '<tr><td class="stk sk0"><div class="nbadge">'+p.num+'</div></td><td class="stk sk1">'+p.name+'</td>'+cells+'<td style="color:var(--gold);font-weight:700">'+(tJ||'–')+'</td><td style="color:var(--red);font-weight:700">'+(tR||'–')+'</td><td style="color:#c084fc;font-weight:700">'+(tS||'–')+'</td></tr>';
  });

  var th = document.getElementById('disc-hdr');
  var tb = document.getElementById('disc-body');
  if(th) th.innerHTML = hdr;
  if(tb) tb.innerHTML = body;
}

function toggleSusp(pid, mid) {
  var key = pid+'_'+mid;
  if(!APP.pmd[key]) APP.pmd[key]={};
  APP.pmd[key].suspension = !APP.pmd[key].suspension;
  renderCartons();
}

// ── RECAP ─────────────────────────────────────────────────────────────────────
function renderRecap(){
  renderRecapThead();
  // ── Labels ────────────────────────────────────────────────────
  var sl=document.getElementById('recap-season-lbl');
  if(sl)sl.textContent=APP.season||'';

  // ── Filter list ───────────────────────────────────────────────
  var list=APP.players.filter(function(p){
    if(typeof fRSearch!=='undefined'&&fRSearch&&p.name.toLowerCase().indexOf(fRSearch)<0)return false;
    if(typeof fRGrp!=='undefined'&&fRGrp!=='all'&&p.group!==fRGrp)return false;
    return true;
  });
  var sortVal=typeof rSort!=='undefined'?rSort:'num';
  if(sortVal==='buts') list.sort(function(a,b){return sbuts(b)-sbuts(a);});
  else if(sortVal==='min') list.sort(function(a,b){return smin(b)-smin(a);});
  else list.sort(function(a,b){return parseInt(a.num||99)-parseInt(b.num||99);});

  // ── Helpers: compute stats live from pmd ──────────────────────
  function getPlayerStats(p){
    var l2m=0,l2t=0,l2r=0,l2min=0,l2b=0;
    var cdfm=0,cdft=0,cdfr=0,cdfmin=0,cdfb=0;
    var pJ=0,pR=0,pS=0;
    var allMatches=[
      {list:APP.matches.L2, comp:'L2'},
      {list:APP.matches.CDF,comp:'CDF'}
    ];
    allMatches.forEach(function(mc){
      mc.list.forEach(function(m){
        var d=(APP.pmd||{})[p.id+'_'+m.id]||{};
        if(d.statut==='T'||d.statut==='R'){
          var mins=d.min!==undefined&&d.min!==''?+d.min:90;
          var buts=d.buts||0;
          if(mc.comp==='L2'){l2m++;if(d.statut==='T')l2t++;else l2r++;l2min+=mins;l2b+=buts;}
          else{cdfm++;if(d.statut==='T')cdft++;else cdfr++;cdfmin+=mins;cdfb+=buts;}
        }
        // Cartons
        if(d.c_j){pJ++;}
        if(d.c_j2){pJ+=2;pR++;}
        if(d.c_r){pR++;}
        if(d.suspension){pS++;}
        // backward compat
        if(!d.c_j&&!d.c_j2&&!d.c_r){
          if(d.carton==='jaune')pJ++;
          else if(d.carton==='dj'){pJ+=2;pR++;}
          else if(d.carton==='rouge')pR++;
        }
      });
    });
    return{l2m:l2m,l2t:l2t,l2r:l2r,l2min:l2min,l2b:l2b,
           cdfm:cdfm,cdft:cdft,cdfr:cdfr,cdfmin:cdfmin,cdfb:cdfb,
           tm:l2m+cdfm,tmin:l2min+cdfmin,tb:l2b+cdfb,pJ:pJ,pR:pR,pS:pS};
  }
  function sbuts(p){var s=getPlayerStats(p);return s.tb;}
  function smin(p){var s=getPlayerStats(p);return s.tmin;}

  // ── Global totals ─────────────────────────────────────────────
  var gMin=0,gButs=0,gJ=0,gR=0;
  list.forEach(function(p){
    var s=getPlayerStats(p);
    gMin+=s.tmin;gButs+=s.tb;gJ+=s.pJ;gR+=s.pR;
  });

  // ── Summary cards ─────────────────────────────────────────────
  var used=list.filter(function(p){var s=getPlayerStats(p);return s.tm>0;}).length;
  var l2played=APP.matches.L2.filter(function(m){return m.score;}).length;
  var cdfplayed=APP.matches.CDF.filter(function(m){return m.score;}).length;
  var topScorer=null,topButs=0;
  list.forEach(function(p){var s=getPlayerStats(p);if(s.tb>topButs){topButs=s.tb;topScorer=p;}});

  var rg=document.getElementById('recap-grid');
  if(rg)rg.innerHTML=
    '<div class="rcrd"><div class="rval">'+used+'</div><div class="rlbl">Joueurs utilisés</div></div>'+
    '<div class="rcrd"><div class="rval">'+l2played+'/'+APP.matches.L2.length+'</div><div class="rlbl">Journées L2</div></div>'+
    '<div class="rcrd"><div class="rval">'+cdfplayed+'</div><div class="rlbl">Tours CDF</div></div>'+
    '<div class="rcrd"><div class="rval">'+gButs+'</div><div class="rlbl">Buts totaux</div></div>'+
    '<div class="rcrd"><div class="rval" style="font-size:18px">'+gMin.toLocaleString()+'</div><div class="rlbl">Min totales</div></div>'+
    '<div class="rcrd" style="overflow:hidden"><div class="rval nm">'+(topScorer?topScorer.name:'–')+'</div><div class="rlbl">Top Buteur'+(topScorer?' ('+topButs+'b)':'')+'</div></div>';

  var cntEl=document.getElementById('recap-count');
  if(cntEl)cntEl.textContent=list.length+' joueurs';

  // ── Build table rows ──────────────────────────────────────────
  var groups=[];
  list.forEach(function(p){if(groups.indexOf(p.group)<0)groups.push(p.group);});

  var ST='position:sticky;z-index:2;background:#fff;';
  var TD='padding:11px 8px;border-bottom:1px solid #e2ddd8;text-align:center;white-space:nowrap;';
  var TDl='padding:11px 12px;border-bottom:1px solid #e2ddd8;text-align:left;white-space:nowrap;';
  var TDr=TD+'color:var(--red);font-weight:700;';
  var TDg=TD+'color:var(--gold);font-weight:700;';
  var TDv=TD+'color:#c084fc;font-weight:700;';

  var rows='';
  groups.forEach(function(g){
    rows+='<tr><td colspan="16" style="'+ST+'left:0;background:#f0ede8;font-family:Barlow Condensed,sans-serif;'+
      'font-weight:800;font-size:12px;text-transform:uppercase;letter-spacing:2px;color:#888;'+
      'padding:7px 14px;border-bottom:1px solid #e2ddd8">⚽ '+g+'</td></tr>';

    list.filter(function(p){return p.group===g;}).forEach(function(p){
      var s=getPlayerStats(p);
      rows+='<tr data-pid="'+p.id+'">'+
        '<td style="'+ST+'left:0;'+TD+'"><div class="nbadge">'+p.num+'</div></td>'+
        '<td style="'+ST+'left:38px;'+TDl+'font-weight:700;border-right:2px solid #e0dbd6">'+p.name+'</td>'+
        '<td class="ed-cell" data-pid="'+p.id+'" data-field="group" style="'+TD+'cursor:pointer">'+
          '<span style="font-size:11px;background:#f5f2ee;color:#777;padding:3px 9px;border-radius:20px;font-weight:600;border:1px solid #ddd">'+p.group+'</span>'+
        '</td>'+
        '<td onclick="showRecapDetail(\''+p.id+'\',\'matchs\')" style="'+TD+'font-weight:600;cursor:pointer" title="Voir détail">'+s.tm+'</td>'+
        '<td style="'+TD+'font-weight:700;color:#3b82f6">'+s.l2t+'</td>'+
        '<td style="'+TD+'font-weight:700;color:#8b5cf6">'+s.l2r+'</td>'+
        '<td style="'+TD+'font-weight:600">'+s.l2min+' min</td>'+
        '<td style="'+TD+'font-weight:700;color:#86efac">'+s.cdft+'</td>'+
        '<td style="'+TD+'font-weight:700;color:#d8b4fe">'+s.cdfr+'</td>'+
        '<td style="'+TD+'font-weight:600">'+s.cdfmin+' min</td>'+
        '<td onclick="showRecapDetail(\''+p.id+'\',\'min\')" style="'+TD+'font-weight:600;color:#555;cursor:pointer" title="Voir détail">'+s.tmin+' min</td>'+
        '<td onclick="showRecapDetail(\''+p.id+'\',\'l2b\')" style="'+TDr+'cursor:pointer" title="Voir détail">'+s.l2b+'</td>'+
        '<td onclick="showRecapDetail(\''+p.id+'\',\'cdfb\')" style="'+TDr+'cursor:pointer" title="Voir détail">'+s.cdfb+'</td>'+
        '<td onclick="showRecapDetail(\''+p.id+'\',\'buts\')" style="'+TDr+'font-size:15px;cursor:pointer;font-weight:900" title="Voir détail">'+s.tb+'</td>'+
        '<td style="'+TDg+'">'+(s.pJ||'–')+'</td>'+
        '<td style="'+TDr+'">'+(s.pR||'–')+'</td>'+
        '<td style="'+TDv+'">'+(s.pS||'–')+'</td>'+
      '</tr>';
    });
  });

  var tb=document.getElementById('recap-tbl');
  if(tb)tb.innerHTML=rows;

  // ── Footer totals ─────────────────────────────────────────────
  var ft=document.getElementById('recap-foot');
  if(ft)ft.innerHTML=
    '<tr style="background:#f0ede8">'+
    '<td style="'+ST+'left:0;background:#f0ede8;'+TD+'"></td>'+
    '<td style="'+ST+'left:38px;background:#f0ede8;'+TDl+'font-family:Barlow Condensed,sans-serif;font-weight:800;font-size:13px;text-transform:uppercase;letter-spacing:1px;color:#888;border-right:2px solid #e0dbd6">TOTAUX</td>'+
    '<td colspan="7" style="'+TD+'background:#f0ede8"></td>'+
    '<td style="'+TD+'background:#f0ede8;font-weight:800;font-size:15px;color:#555">'+gMin.toLocaleString()+' min</td>'+
    '<td colspan="2" style="'+TD+'background:#f0ede8"></td>'+
    '<td style="'+TDr+'background:#f0ede8;font-size:15px">'+gButs+'</td>'+
    '<td style="'+TDg+'background:#f0ede8;font-size:15px">'+(gJ||'–')+'</td>'+
    '<td style="'+TDr+'background:#f0ede8;font-size:15px">'+(gR||'–')+'</td>'+
    '<td style="background:#f0ede8"></td>'+
    '</tr>';
}



// Edit cell via event delegation
document.addEventListener('click', function(e) {
  var cell = e.target.closest ? e.target.closest('[data-pid][data-field]') : null;
  if (!cell) return;
  var pid = cell.getAttribute('data-pid');
  var field = cell.getAttribute('data-field');
  if (!pid || !field) return;
  var p = APP.players.find(function(x){ return x.id===pid; });
  if (!p) return;
  var inp;
  if (field==='group') {
    inp = document.createElement('select');
    ['Pro1','Pro2'].forEach(function(v){ var o=document.createElement('option');o.value=v;o.textContent=v;if(p.group===v)o.selected=true;inp.appendChild(o); });
  } else {
    inp = document.createElement('input');
    inp.type='number'; inp.min='0';
    inp.value = p[field]!==undefined ? p[field] : 0;
  }
  inp.style.cssText='border:2px solid var(--red);border-radius:4px;padding:4px 6px;font-size:14px;width:80px;font-family:Barlow,sans-serif;color:#111;background:#fff;display:block';
  cell.innerHTML='';cell.appendChild(inp);inp.focus();
  var done=false;
  function save(){
    if(done)return;done=true;
    if(field==='group') p.group=inp.value;
    else p[field]=+inp.value;
    renderRecap();
  }
  inp.addEventListener('blur',save);
  inp.addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();save();}if(e.key==='Escape')renderRecap();});
});

// ── PASSPORT ALERTS ───────────────────────────────────────────────────────────
function renderPassportAlerts() {
  var c = document.getElementById('passport-alerts');
  if (!c) return;
  var today=new Date(), sixM=new Date(today), threeM=new Date(today);
  sixM.setMonth(sixM.getMonth()+6); threeM.setMonth(threeM.getMonth()+3);
  var alerts = [];
  APP.players.forEach(function(p){
    if(!p.passport) return;
    var exp=new Date(p.passport); if(isNaN(exp)) return;
    var diff=Math.floor((exp-today)/86400000);
    if(exp<=sixM) alerts.push({p:p,exp:exp,diff:diff});
  });
  alerts.sort(function(a,b){return a.diff-b.diff;});
  var badge = document.getElementById('pbadge');
  if(badge) badge.textContent = alerts.length||'';
  if(!alerts.length){
    c.innerHTML='<div style="text-align:center;padding:50px 20px;color:#888"><div style="font-size:52px;margin-bottom:14px">✅</div><div style="font-family:Barlow Condensed,sans-serif;font-weight:800;font-size:22px;color:#333;text-transform:uppercase">Aucune alerte passeport</div><div style="font-size:14px;margin-top:8px">Tous les passeports sont valides plus de 6 mois.</div></div>';
    return;
  }
  c.innerHTML = alerts.map(function(it){
    var p=it.p,exp=it.exp,diff=it.diff;
    var crit=exp<=threeM,expired=diff<0;
    var color=crit?'var(--red)':'var(--gold)';
    var diffStr=expired?'EXPIRÉ depuis '+Math.abs(diff)+' j':diff+' j restants';
    return '<div style="background:#fff;border-left:5px solid '+color+';border-radius:7px;padding:14px 18px;margin-bottom:10px;display:flex;align-items:center;gap:14px;box-shadow:0 2px 6px rgba(0,0,0,.07)"><div style="font-size:26px">'+(expired?'🚫':crit?'🚨':'⚠️')+'</div><div style="flex:1"><div style="font-family:Barlow Condensed,sans-serif;font-weight:800;font-size:18px;text-transform:uppercase">'+p.num+' — '+p.name+'</div><div style="font-size:13px;color:#888;margin-top:3px">'+p.pos+' · '+p.group+' · Exp: '+exp.toLocaleDateString('fr-FR')+'</div></div><div style="text-align:right"><div style="font-family:Barlow Condensed,sans-serif;font-weight:800;font-size:17px;color:'+color+'">'+diffStr+'</div><button onclick="showEditPlayerModal(\''+p.id+'\')" style="margin-top:5px;background:var(--red);color:#fff;border:none;border-radius:4px;padding:5px 11px;font-family:Barlow Condensed,sans-serif;font-weight:700;font-size:12px;text-transform:uppercase;cursor:pointer">Modifier</button></div></div>';
  }).join('');
}

// MATCH MODAL
function showMatchModal(id) {
  var m = APP.matches[curComp].find(function(x){return x.id===id;});
  if (!m) return;
  var r = m.res || getRes(m.score, m.name);
  var isCDF = curComp === 'CDF';

  // ── Get selected players for this match ──────────────────────
  var selected = APP.players.filter(function(p) {
    var d = APP.pmd[p.id+'_'+id] || {};
    return d.statut === 'T' || d.statut === 'R';
  });

  // Sort: Titulaires first, then Remplaçants, then by number
  selected.sort(function(a,b) {
    var da = APP.pmd[a.id+'_'+id] || {};
    var db = APP.pmd[b.id+'_'+id] || {};
    if (da.statut === db.statut) return parseInt(a.num||99) - parseInt(b.num||99);
    return da.statut === 'T' ? -1 : 1;
  });

  // ── Build player list ─────────────────────────────────────────
  var playersList = '';
  if (selected.length === 0) {
    playersList = '<div style="color:#aaa;font-size:13px;text-align:center;padding:12px 0">Aucun joueur sélectionné — cliquer Modifier</div>';
  } else {
    var tit = selected.filter(function(p){return (APP.pmd[p.id+'_'+id]||{}).statut==='T';});
    var rempl = selected.filter(function(p){return (APP.pmd[p.id+'_'+id]||{}).statut==='R';});

    function buildPlayerRow(p) {
      var d = APP.pmd[p.id+'_'+id] || {};
      var mins = d.min !== undefined && d.min !== '' ? d.min + '\'' : '';
      var buts = d.buts ? '⚽'.repeat(Math.min(d.buts, 4)) + (d.buts > 4 ? d.buts : '') : '';
      var cartons = '';
      if (d.c_j || d.carton==='jaune') cartons += '<span style="display:inline-block;width:10px;height:13px;background:#FFD700;border-radius:1px;vertical-align:middle;margin-left:3px"></span>';
      if (d.c_j2 || d.carton==='dj') cartons += '<span style="display:inline-block;width:10px;height:13px;background:#FFD700;border-radius:1px;vertical-align:middle;margin-left:2px"></span><span style="display:inline-block;width:10px;height:13px;background:var(--red);border-radius:1px;vertical-align:middle;margin-left:1px"></span>';
      if (d.c_r || d.carton==='rouge') cartons += '<span style="display:inline-block;width:10px;height:13px;background:var(--red);border-radius:1px;vertical-align:middle;margin-left:3px"></span>';
      if (d.suspension) cartons += '<span style="background:var(--red);color:#fff;font-size:9px;font-weight:800;border-radius:2px;padding:1px 3px;margin-left:3px">S</span>';

      return '<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #f5f3ef">' +
        '<div style="background:var(--red);color:#fff;border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0">' + p.num + '</div>' +
        '<span style="font-weight:700;font-size:13px;flex:1">' + p.name + '</span>' +
        '<span style="font-size:12px;color:#888;min-width:28px;text-align:right">' + mins + '</span>' +
        '<span style="font-size:13px">' + buts + '</span>' +
        cartons +
      '</div>';
    }

    if (tit.length) {
      playersList += '<div style="font-family:Barlow Condensed,sans-serif;font-weight:800;font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#888;margin:8px 0 4px">Titulaires (' + tit.length + ')</div>';
      playersList += tit.map(buildPlayerRow).join('');
    }
    if (rempl.length) {
      playersList += '<div style="font-family:Barlow Condensed,sans-serif;font-weight:800;font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#888;margin:10px 0 4px">Remplaçants (' + rempl.length + ')</div>';
      playersList += rempl.map(buildPlayerRow).join('');
    }
  }

  // ── Buteurs SDR ───────────────────────────────────────────────
  var scorersHtml = '';
  var scorers = selected.filter(function(p){ return (APP.pmd[p.id+'_'+id]||{}).buts > 0; });
  if (scorers.length) {
    scorersHtml = '<div style="background:#f0fdf4;border-radius:6px;padding:8px 12px;margin-bottom:10px;font-size:13px">' +
      scorers.map(function(p){
        var d = APP.pmd[p.id+'_'+id]||{};
        return '⚽ ' + p.name + (d.buts>1?' (×'+d.buts+')':'') + (d.but_min?' '+d.but_min+'\'' :'');
      }).join(' · ') +
    '</div>';
  }

  openModal(
    '<div class="mo-hdr"><div class="mo-title">'+m.j+' — '+m.name+'</div>' +
    '<button class="mo-x" onclick="closeModal()">✕</button></div>' +
    '<div class="mo-body">' +

    // Stats bar
    '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px">' +
      '<div class="sm"><div class="sm-val">'+m.j+'</div><div class="sm-lbl">Journée</div></div>' +
      '<div class="sm"><div class="sm-val" style="color:'+(SC[r]||'#888')+';font-size:20px">'+(m.score||'–')+'</div>' +
        '<div class="sm-lbl">'+(isCDF?(r==='win'?'✅ Qualifié':'❌ Éliminé'):'Résultat')+'</div></div>' +
      '<div class="sm"><div class="sm-val" style="font-size:14px">'+(m.date||'–')+'</div><div class="sm-lbl">Date</div></div>' +
    '</div>' +

    // Scorers
    scorersHtml +

    // Players
    '<div style="max-height:320px;overflow-y:auto">' +
      playersList +
    '</div>' +

    '</div>' +
    '<div class="mo-foot">' +

function toggleChip(pid,mid){
  var key=pid+'_'+mid;
  if(!APP.pmd[key])APP.pmd[key]={};
  var d=APP.pmd[key];
  if(d.statut==='T'||d.statut==='R') delete APP.pmd[key];
  else{d.statut='T';d.min=90;d.buts=0;}
  var ch=document.getElementById('ch_'+pid);
  if(ch)ch.classList.toggle('sel',!!(APP.pmd[key]&&(APP.pmd[key].statut==='T'||APP.pmd[key].statut==='R')));
  var c=APP.players.filter(function(p){var d2=APP.pmd[p.id+'_'+mid];return d2&&(d2.statut==='T'||d2.statut==='R');}).length;
  var el=document.getElementById('cnt');if(el)el.textContent=c+' sélectionnés';
  renderMPD(mid);
}


function setStatut(key, val, mid) {
  if (!APP.pmd[key]) APP.pmd[key] = {};
  APP.pmd[key].statut = val;
  // When set as Remplaçant → reset minutes to 0 (will be updated when they enter)
  if (val === 'R') {
    APP.pmd[key].min = 0;
    APP.pmd[key]._benchStart = true; // flag: not yet entered
  } else if (val === 'T') {
    // Titulaire → default 90 min if not set
    if (!APP.pmd[key].min || APP.pmd[key]._benchStart) {
      APP.pmd[key].min = 90;
      APP.pmd[key]._benchStart = false;
    }
  }
  renderMPD(mid);
  try { renderRecap(); } catch(e) {}
}

function updPMD(key,field,val){if(!APP.pmd[key])APP.pmd[key]={};APP.pmd[key][field]=val;clearTimeout(window._rpTimer);window._rpTimer=setTimeout(function(){try{renderRecap();}catch(e){}},300);}
function setCarton(key,type,mid){
  if(!APP.pmd[key])APP.pmd[key]={};
  var d=APP.pmd[key];
  // Toggle individual carton flags
  if(type==='jaune'){d.c_j=!d.c_j;}
  else if(type==='rouge'){d.c_r=!d.c_r;}
  else if(type==='dj'){
    // 2J=R = 2 jaunes + rouge
    if(d.c_j2){d.c_j2=false;d.c_r2=false;}
    else{d.c_j2=true;d.c_r2=true;}
  }
  // Keep .carton for backward compat with cartons table
  if(d.c_j2){d.carton='dj';}
  else if(d.c_r){d.carton='rouge';}
  else if(d.c_j){d.carton='jaune';}
  else{d.carton='';}
  renderMPD(mid);
}

function staffC2(sid,mid,type){
  var key=sid+'_'+mid;
  if(!APP.pmd[key])APP.pmd[key]={};
  APP.pmd[key].carton=(APP.pmd[key].carton===type)?'':type;
  var s=APP.staff.find(function(x){return x.id===sid;});
  if(s){
    s.jaunes=0;s.rouges=0;
    APP.matches.L2.forEach(function(m){
      var d=APP.pmd[sid+'_'+m.id]||{};
      if(d.c_j)s.jaunes++;
      if(d.c_j2){s.jaunes+=2;s.rouges++;}
      if(d.c_r)s.rouges++;
    });
  }
  renderStaff();showStaffModal(sid);
}

function staffS2(sid,mid){
  var key=sid+'_'+mid;
  if(!APP.pmd[key])APP.pmd[key]={};
  APP.pmd[key].suspension=!APP.pmd[key].suspension;
  var s=APP.staff.find(function(x){return x.id===sid;});
  if(s)s.susp=APP.matches.L2.filter(function(m){return(APP.pmd[sid+'_'+m.id]||{}).suspension;}).length;
  renderStaff();showStaffModal(sid);
}

function staffMin2(sid,mid,val){
  var key=sid+'_'+mid;
  if(!APP.pmd[key])APP.pmd[key]={};
  APP.pmd[key].carton_min=val;
}


function staffCrtn(sid,mid,type){
  var key=sid+'_'+mid;if(!APP.pmd[key])APP.pmd[key]={};

function staffSusp(sid,mid){

}

function sfPreviewPhoto(input) {
  if (!input.files || !input.files[0]) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    document.getElementById('sf-passport-photo-data').value = e.target.result;
    var prev = document.getElementById('sf-pp-preview');
    if (prev) prev.innerHTML = '<img src="'+e.target.result+'" style="width:32px;height:42px;object-fit:cover;border-radius:3px">';
  };
  reader.readAsDataURL(input.files[0]);
}

function saveStaff(id){

function createNewSeason(){
  try{
    var nameEl=document.getElementById('ns-name');
    var champEl=document.getElementById('ns-champ');
    var sn=(nameEl&&nameEl.value.trim())||'2026/2027';
    var champ=(champEl&&champEl.value)||'Ligue 2';
    if(!confirm('Créer la saison '+sn+' en '+champ+' ?\n\nStatistiques et matchs effacés.\nJoueurs et staff conservés.'))return;
    APP.pmd={};
    APP.matches.L2=[];
    for(var i=0;i<34;i++){
      var jv=(document.getElementById('ns-j'+i)||{}).value||('J'+(i+1));
      var nv=((document.getElementById('ns-n'+i)||{}).value||'').trim();
      var av=((document.getElementById('ns-a'+i)||{}).value||'').trim();
      if(nv||av)APP.matches.L2.push({id:'m'+Date.now()+'_'+i,j:jv,name:nv||(jv+'-SDR'),adv:av,date:'',score:'',res:''});
    }
    APP.matches.CDF=[];
    var ct=['7T','8T','32F','16F','8F','QF','SF','F'];
    for(var ci=0;ci<ct.length;ci++){
      var cj=(document.getElementById('ns-cj'+ci)||{}).value||ct[ci];
      var cn=((document.getElementById('ns-cn'+ci)||{}).value||'').trim();
      var ca=((document.getElementById('ns-ca'+ci)||{}).value||'').trim();
      if(cn||ca)APP.matches.CDF.push({id:'c'+Date.now()+'_'+ci,j:cj,name:cn,adv:ca,date:'',score:'',res:''});
    }
    APP.matches.AMI=[];
    APP.players.forEach(function(p){p.l2_matchs=p.l2_tit=p.l2_rempl=p.l2_min=p.l2_buts=p.cdf_matchs=p.cdf_min=p.cdf_buts=0;});
    APP.staff.forEach(function(s){/* keep */});
    APP.season=sn; APP.champName=champ;
    var upd=[['season-display',sn+' \u25bc'],['recap-season-lbl',sn],['champ-tab-lbl','Championnat '+champ],['carton-champ-lbl',champ]];
    upd.forEach(function(u){var el=document.getElementById(u[0]);if(el)el.textContent=u[1];});
    closeModal();curComp='L2';
    document.querySelectorAll('#page-competitions .tab').forEach(function(t,i){if(i===0)t.classList.add('active');else t.classList.remove('active');});
    renderCompStats();renderMatchList();
    alert('\u2705 Saison '+sn+' créée en '+champ+' !');
  }catch(err){alert('Erreur: '+err.message);}
}

// EXPORT
function exportData(type,format){
  var data=[],headers=[],filename='export';
  if(type==='competitions'){
    headers=['Journée','Match','Date','Score','Résultat'];
    var all=APP.matches.L2.map(function(m){return Object.assign({},m,{comp:'L2'});})
      .concat(APP.matches.CDF.map(function(m){return Object.assign({},m,{comp:'CDF'});}))
      .concat(APP.matches.AMI.map(function(m){return Object.assign({},m,{comp:'Amical'});}));
    data=all.map(function(m){return[m.j,m.name||'',m.date||'',m.score||'',m.res||''];});
    filename='competitions_'+(APP.season||'saison');
  } else if(type==='cartons'){
    headers=['Numéro','Joueur','Groupe','Jaunes','Rouges','Suspensions'];
    data=APP.players.map(function(p){
      var j=0,r=0,s=0;
      APP.matches.L2.concat(APP.matches.CDF||[]).forEach(function(m){
        var d=(APP.pmd||{})[p.id+'_'+m.id]||{};
        if(d.carton==='jaune')j++;
        else if(d.carton==='dj'){j+=2;r++;}
        else if(d.carton==='rouge')r++;
        if(d.suspension)s++;
      });
      return[p.num||'',p.name,p.group,j,r,s];
    });
    filename='cartons_'+(APP.season||'saison');
  } else {
    headers=['#','Joueur','Groupe','Matchs','L2 Tit.','L2 Rempl.','Min L2','Min CDF','Min Total','Buts L2','Buts CDF','Buts Total','Jaunes','Rouges'];
    data=APP.players.map(function(p){
      var pJ=0,pR=0;
      APP.matches.L2.concat(APP.matches.CDF||[]).forEach(function(m){
        var d=(APP.pmd||{})[p.id+'_'+m.id]||{};
        if(d.c_j)pJ++;
        if(d.c_j2){pJ+=2;pR++;}
        if(d.c_r)pR++;
      });
      return[p.num||'',p.name,p.group,(p.l2_matchs||0)+(p.cdf_matchs||0),p.l2_tit||0,p.l2_rempl||0,p.l2_min||0,p.cdf_min||0,(p.l2_min||0)+(p.cdf_min||0),p.l2_buts||0,p.cdf_buts||0,(p.l2_buts||0)+(p.cdf_buts||0),pJ,pR];
    });
    filename='recap_'+(APP.season||'saison');
  }
  if(format==='csv'){
    var bom='\uFEFF';
    var csv=bom+headers.map(function(h){return'"'+h+'"';}).join(',')
      +'\n'
      +data.map(function(row){return row.map(function(c){return'"'+(c||'').toString().replace(/"/g,'""')+'"';}).join(',');}).join('\n');
    dlFile(csv,filename+'.csv','text/csv;charset=utf-8;');
  } else {
    var style='<style>body{font-family:Arial,sans-serif;font-size:12px}table{border-collapse:collapse;width:100%}th{background:#1C1C1C;color:#fff;padding:8px 12px;font-weight:700;text-align:left}td{border:1px solid #ddd;padding:7px 12px}tr:nth-child(even){background:#f9f9f9}</style>';
    var tbl=headers.map(function(h){return'<th>'+h+'</th>';}).join('');
    tbl='<tr>'+tbl+'</tr>';
    data.forEach(function(row){tbl+='<tr>'+row.map(function(c){return'<td>'+(c||'')+'</td>';}).join('')+'</tr>';});
    var xls='<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns="http://www.w3.org/TR/REC-html40">'+
      '<head><!--[if gte mso 9]><xml><x:ExcelWorkbook><x:ExcelWorksheets><x:ExcelWorksheet><x:Name>'+filename+'</x:Name><x:WorksheetOptions><x:DisplayGridlines/></x:WorksheetOptions></x:ExcelWorksheet></x:ExcelWorksheets></x:ExcelWorkbook></xml><![endif]-->'+style+'</head>'+
      '<body><table>'+tbl+'</table></body></html>';
    dlFile(xls,filename+'.xls','application/vnd.ms-excel;charset=utf-8;');
  }
}

function dlFile(content,filename,mime){
  var blob=new Blob([content],{type:mime});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;a.download=filename;
  document.body.appendChild(a);a.click();
  setTimeout(function(){document.body.removeChild(a);URL.revokeObjectURL(url);},200);
}

// ═══════════════════════════════════════════════════════════════════
// MODE LIVE MATCH — Chronomètre + Actions en temps réel
// ═══════════════════════════════════════════════════════════════════
var _LIVE = {
  matchId: null,
  comp: null,
  startTime: null,
  elapsed: 0,
  running: false,
  half: 1,
  timer: null,
  firstHalfElapsed: 0,
  events: [],
  scoreSDR: 0,          // SDR goals
  scoreADV: 0,          // Opponent goals
  active: false         // True = live is running in background
};

function liveGetMin() {
  var ms = _LIVE.elapsed + (_LIVE.running ? Date.now() - _LIVE.startTime : 0);
  var baseMin = _LIVE.half === 2 ? 45 : 0;
  return baseMin + Math.floor(ms / 60000);
}

function liveGetDisplay() {
  var ms = _LIVE.elapsed + (_LIVE.running ? Date.now() - _LIVE.startTime : 0);
  var totalSec = Math.floor(ms / 1000);
  var base = _LIVE.half === 1 ? 0 : 45;
  var gameMin = base + Math.floor(totalSec / 60);
  var gameSec = totalSec % 60;
  var secStr = (gameSec < 10 ? '0' : '') + gameSec;
  var extra = _LIVE.half === 1 ? Math.max(0, gameMin - 45) : Math.max(0, gameMin - 90);
  var display, minLabel;
  if (_LIVE.half === 1 && gameMin > 45) {
    display = '45+' + extra + "'" + '<span style="font-size:36px;opacity:.7">:' + secStr + '</span>';
    minLabel = '45+' + extra + "'";
  } else if (_LIVE.half === 2 && gameMin > 90) {
    display = '90+' + extra + "'" + '<span style="font-size:36px;opacity:.7">:' + secStr + '</span>';
    minLabel = '90+' + extra + "'";
  } else {
    display = gameMin + "'" + '<span style="font-size:36px;opacity:.7">:' + secStr + '</span>';
    minLabel = gameMin + "'";
  }
  return { display: display, min: gameMin, sec: gameSec, minLabel: minLabel };
}

function liveStart() {
  if (_LIVE.running) return;
  _LIVE.startTime = Date.now();
  _LIVE.running = true;
  _LIVE.active = true;
  _LIVE.timer = setInterval(function(){
    liveTickUI();
    liveUpdateIndicator();
  }, 500);
  liveTickUI();
  liveRenderControls();
}

function livePause() {
  if (!_LIVE.running) return;
  _LIVE.elapsed += Date.now() - _LIVE.startTime;
  _LIVE.running = false;
  clearInterval(_LIVE.timer);
  liveTickUI();
  liveRenderControls();
  liveUpdateIndicator();
}

function liveHalfTime() {
  livePause();
  // Store 1st half elapsed for total time computation
  _LIVE.firstHalfElapsed = _LIVE.elapsed;
  _LIVE.half = 2;
  _LIVE.elapsed = 0;
  _LIVE.startTime = null;
  liveTickUI();
  liveRenderControls();
  _LIVE.events.push({ min: 45, type: 'mi-temps', label: '⏸ Mi-temps' });
  liveRenderLog();
}

function liveEnd() {
  livePause();
  var finalMin = liveGetMin();
  // Use real elapsed time for total match duration
  var firstHalf = _LIVE.firstHalfElapsed || 0;
  var totalMs = firstHalf + _LIVE.elapsed;
  var totalMatchMin = Math.min(120, Math.floor(totalMs / 60000));

  _LIVE.events.push({ min: finalMin, type: 'fin', label: '🏁 Fin du match (' + finalMin + '\')' });
  liveRenderLog();

  // ── Auto-save score ────────────────────────────────────────────
  var scoreEl = document.getElementById('live-score');
  if (scoreEl && scoreEl.value) {
    var m = APP.matches[_LIVE.comp].find(function(x){ return x.id === _LIVE.matchId; });
    if (m) {
      m.score = scoreEl.value;
      m.res = getRes(m.score, m.name);
    }
  }

  // ── Compute minutes for every player from live events ──────────
  var comp = _LIVE.comp;
  var mid = _LIVE.matchId;
  var isCDF = comp === 'CDF';

  // Build substitution map: who went out at what minute, who came in
  var subsOut = {}; // pid -> minute when subbed out
  var subsIn  = {}; // pid -> minute when subbed in
  _LIVE.events.forEach(function(ev) {
    if (ev.type === 'changement') {
      if (ev.pid)  subsOut[ev.pid]  = ev.min;
      if (ev.pid2) subsIn[ev.pid2]  = ev.min;
    }
  });

  // For each player with pmd data on this match
  APP.players.forEach(function(p) {
    var key = p.id + '_' + mid;
    var d = APP.pmd[key] || {};
    if (!d.statut) return; // not selected for this match

    var minPlayed;
    if (subsOut[p.id] !== undefined) {
      // Player was substituted out
      minPlayed = subsOut[p.id];
    } else if (subsIn[p.id] !== undefined) {
      // Player came in as substitute
      minPlayed = finalMin - subsIn[p.id];
    } else if (d.statut === 'R' && d._benchStart) {
      // Remplaçant who never entered — stays at 0 min
      minPlayed = 0;
    } else {
      // Played full match
      minPlayed = finalMin;
    }
    minPlayed = Math.max(0, minPlayed);

    // Write minutes back to pmd
    if (!APP.pmd[key]) APP.pmd[key] = {};
    APP.pmd[key].min = minPlayed;

    // Update statut if subbed in (they are remplacant)
    if (subsIn[p.id] !== undefined) {
      APP.pmd[key].statut = 'R';
    }
  });

  // ── Apply buts from live events to pmd ─────────────────────────
  var butsCount = {};
  _LIVE.events.forEach(function(ev) {
    if (ev.type === 'but' && ev.pid) {
      butsCount[ev.pid] = (butsCount[ev.pid] || 0) + 1;
    }
  });
  Object.keys(butsCount).forEach(function(pid) {
    var key = pid + '_' + mid;
    if (!APP.pmd[key]) APP.pmd[key] = {};
    APP.pmd[key].buts = butsCount[pid];
  });
  // Update final score in match
  liveAutoUpdateScore();

  // ── Refresh all UI ─────────────────────────────────────────────
  renderCompStats();
  renderMatchList();
  try { renderRecap(); } catch(e) {}
  _LIVE.active = false;
  liveHideIndicator();

  // ── Show save confirmation screen ────────────────────────────
  liveSaveAndShow(comp, mid, finalMin);
  // ── Summary alert ──────────────────────────────────────────────
  var summary = '🏁 Match terminé (' + finalMin + '\')\n\n';
  var statsLines = [];
  APP.players.forEach(function(p) {
    var key = p.id + '_' + mid;
    var d = APP.pmd[key] || {};
    if (!d.statut) return;
    var line = p.name + ' — ' + (d.min || 0) + ' min';
    if (d.buts) line += ' · ⚽ ' + d.buts + ' but' + (d.buts > 1 ? 's' : '');
    if (d.c_j) line += ' · 🟨';
    if (d.c_j2) line += ' · 🟥 2J';
    if (d.c_r) line += ' · 🟥 R';
    statsLines.push(line);
  });
  if (statsLines.length) {
    summary += statsLines.join('\n');
    alert(summary);
  }
}


function liveTickUI() {
  var el = document.getElementById('live-clock');
  if (el) {
    var t = liveGetDisplay();
    el.innerHTML = t.display;
    el.style.color = _LIVE.running ? 'var(--red)' : '#888';
  }
  // Auto-update the minute field in the picker if open
  if (_LIVE.running) {
    var minEl = document.getElementById('live-pick-min');
    if (minEl && !minEl.dataset.edited) {
      minEl.value = liveGetMin();
    }
  }
}

    _LIVE.comp = null;

    _LIVE.elapsed = 0;
